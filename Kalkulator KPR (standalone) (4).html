ocks();\n      }\n      recalc();\n    });\n  });\n\n  function setChipActive(id, value) {\n    const wrap = document.getElementById(id);\n    if (!wrap) return;\n    wrap.querySelectorAll(\".chip\").forEach(c => c.classList.toggle(\"active\", +c.dataset.v === value));\n  }\n\n  // Progressive disclosure: tampilkan hanya field bunga yang dipakai per Jenis KPR\n  function updateJenisFields() {\n    const map = {\n      \"Fixed\": [\"f-fix\"],\n      \"Floating\": [\"f-float\"],\n      \"Fixed+Floating\": [\"f-fix\", \"f-periode\", \"f-float\"],\n      \"Capped\": [\"f-float\", \"f-cap\"],\n    };\n    const vis = map[state.jenis] || [];\n    [\"f-fix\", \"f-periode\", \"f-float\", \"f-cap\"].forEach(id => {\n      const el = $(id);\n      if (el) el.hidden = !vis.includes(id);\n    });\n  }\n\n  function updateRateLocks() {\n    // Lock fields that aren't used for this Jenis\n    const locked = state.bank !== \"Isi Manual\" && state.bank !== \"-- Pilih Bank --\";\n    // We allow editing all 4 always; but \"Isi Manual\" marker shows. Could add visual indicator only.\n    // No actual locking — user can override anytime; selecting bank repopulates.\n  }\n\n  // ============ Core calc ============\n  function buildSchedule(opts) {\n    opts = opts || {};\n    const extraM = Math.max(0, opts.extraMonthly || 0);\n    const lumpY = Math.max(0, opts.lumpYearly || 0);\n\n    const dpRp = state.harga * state.dpPct / 100;\n    const biayaRp = state.harga * state.biayaPct / 100;\n    const principal = Math.max(0, (state.harga - dpRp) + biayaRp);\n    const n = state.tenor * 12;\n    const fixR = state.fix / 100 / 12;\n    const fltR = state.float / 100 / 12;\n    const capR = state.cap / 100 / 12;\n    const periodeM = Math.min(state.periode * 12, n);\n\n    let pmtFixed = principal > 0 ? PMT(fixR, n, principal) : 0;\n    let pmtFloating = principal > 0 ? PMT(fltR, n, principal) : 0;\n    let pmtCapped = principal > 0 ? PMT(Math.min(fltR, capR), n, principal) : 0;\n\n    const schedule = [];\n    let balance = principal;\n    let pmtAfter = 0;\n\n    for (let m = 1; m <= n; m++) {\n      if (balance <= 0.01) break;\n      let rate, scheduledPmt;\n      if (state.jenis === \"Fixed\") {\n        rate = fixR; scheduledPmt = pmtFixed;\n      } else if (state.jenis === \"Floating\") {\n        rate = fltR; scheduledPmt = pmtFloating;\n      } else if (state.jenis === \"Capped\") {\n        rate = Math.min(fltR, capR); scheduledPmt = pmtCapped;\n      } else { // Fixed+Floating\n        if (m <= periodeM) {\n          rate = fixR; scheduledPmt = pmtFixed;\n        } else {\n          rate = fltR;\n          if (pmtAfter === 0) {\n            pmtAfter = PMT(fltR, n - periodeM, balance);\n          }\n          scheduledPmt = pmtAfter;\n        }\n      }\n      const bunga = balance * rate;\n      let pokokScheduled = scheduledPmt - bunga;\n      if (pokokScheduled > balance) pokokScheduled = balance;\n      if (pokokScheduled < 0) pokokScheduled = 0;\n\n      // Apply extras (prepayment) — straight to principal, capped at remaining balance\n      let extraNow = extraM;\n      let lumpNow = (lumpY > 0 && m % 12 === 0) ? lumpY : 0;\n      let extraTotal = extraNow + lumpNow;\n      const remainingAfterScheduled = Math.max(0, balance - pokokScheduled);\n      if (extraTotal > remainingAfterScheduled) extraTotal = remainingAfterScheduled;\n\n      const totalPokok = pokokScheduled + extraTotal;\n      const total = bunga + totalPokok;\n      balance = Math.max(0, balance - totalPokok);\n      schedule.push({\n        m, rate: rate * 12, bunga,\n        pokok: totalPokok, total, balance,\n        scheduledPmt: bunga + pokokScheduled, extra: extraTotal,\n      });\n      if (balance <= 0.01) break;\n    }\n\n    let totalBunga = 0, totalPokok = 0, totalBayar = 0;\n    for (const r of schedule) { totalBunga += r.bunga; totalPokok += r.pokok; totalBayar += r.total; }\n\n    const firstPmt = schedule[0]?.scheduledPmt || 0;\n    const afterIdx = state.jenis === \"Fixed+Floating\"\n      ? schedule.findIndex(r => r.m > periodeM)\n      : -1;\n    const afterPmt = afterIdx >= 0 ? schedule[afterIdx].scheduledPmt : firstPmt;\n\n    return { principal, dpRp, biayaRp, schedule, totalBunga, totalPokok, totalBayar, firstPmt, afterPmt, periodeM };\n  }\n\n  // ============ Reverse calculator: max harga rumah ============\n  function reverseCalc() {\n    if (state.income <= 0) return null;\n    const targetCicilan = state.income * 0.30;\n    const n = state.tenor * 12;\n    const fixR = state.fix / 100 / 12;\n    const fltR = state.float / 100 / 12;\n    const capR = state.cap / 100 / 12;\n    const periodeM = Math.min(state.periode * 12, n);\n\n    let pmtPerUnit;\n    if (state.jenis === \"Fixed\") {\n      pmtPerUnit = PMT(fixR, n, 1);\n    } else if (state.jenis === \"Floating\") {\n      pmtPerUnit = PMT(fltR, n, 1);\n    } else if (state.jenis === \"Capped\") {\n      pmtPerUnit = PMT(Math.min(fltR, capR), n, 1);\n    } else { // Fixed+Floating: use worst-case of fixed-phase vs floating-phase\n      const pFix = PMT(fixR, n, 1);\n      const balAfter = Math.pow(1 + fixR, periodeM) - pFix * (Math.pow(1 + fixR, periodeM) - 1) / fixR;\n      const pFlt = PMT(fltR, n - periodeM, balAfter);\n      pmtPerUnit = Math.max(pFix, pFlt);\n    }\n    if (!isFinite(pmtPerUnit) || pmtPerUnit <= 0) return null;\n\n    const maxPrincipal = targetCicilan / pmtPerUnit;\n    const factor = (1 - state.dpPct / 100 + state.biayaPct / 100);\n    if (factor <= 0) return null;\n    const maxHarga = maxPrincipal / factor;\n    return {\n      maxHarga,\n      maxDp: maxHarga * state.dpPct / 100,\n      maxBiaya: maxHarga * state.biayaPct / 100,\n      maxCicilan: targetCicilan,\n    };\n  }\n\n  // ============ Render ============\n  function recalc() {\n    // Update derived outputs\n    const dpRp = state.harga * state.dpPct / 100;\n    const biayaRp = state.harga * state.biayaPct / 100;\n    const batas = state.income * 0.3;\n    $(\"o-harga\").textContent = fmtShort(state.harga);\n    $(\"o-dp-pct\").textContent = state.dpPct.toFixed(0) + \"%\";\n    $(\"o-dp-rp\").value = Math.round(dpRp).toLocaleString(\"id-ID\");\n    $(\"o-biaya-pct\").textContent = state.biayaPct.toLocaleString(\"id-ID\", {maximumFractionDigits:1}) + \"%\";\n    $(\"o-biaya-rp\").textContent = fmtRp(biayaRp);\n    $(\"o-tenor\").textContent = state.tenor;\n    $(\"o-tenor-bln\").textContent = state.tenor * 12;\n    $(\"o-batas\").textContent = fmtRp(batas);\n\n    // Jenis hint\n    const hints = {\n      \"Fixed\": \"Cicilan tetap sepanjang tenor — paling aman untuk perencanaan.\",\n      \"Floating\": \"Cicilan mengikuti bunga floating bank — bisa naik/turun.\",\n      \"Fixed+Floating\": \"Cicilan tetap selama periode fixed, lalu mengikuti floating.\",\n      \"Capped\": \"Cicilan floating namun dibatasi bunga maksimum (cap).\"\n    };\n    $(\"hint-jenis\").textContent = hints[state.jenis];\n\n    // Progressive disclosure: hanya tampilkan field bunga yang relevan\n    updateJenisFields();\n\n    // Hint bank — perjelas hubungan \"pilih bank\" vs \"isi manual\"\n    {\n      const hb = $(\"hint-bank\");\n      if (hb) {\n        if (state.bank === \"-- Pilih Bank --\") hb.textContent = \"Pilih bank untuk mengisi bunga otomatis — atau isi manual di kolom bunga di bawah.\";\n        else if (state.bank === \"Isi Manual\") hb.textContent = \"Bunga sedang diisi manual. Pilih bank di atas untuk memakai rate referensi.\";\n        else hb.textContent = `Bunga terisi otomatis dari ${state.bank} (ref. Mei 2025) — bisa kamu ubah manual kapan saja.`;\n      }\n    }\n\n    // Compute schedule — baseline (no prepay) + actual (with prepay if on)\n    const baseline = buildSchedule();\n    const actual = state.prepayOn\n      ? buildSchedule({ extraMonthly: state.prepayMonthly, lumpYearly: state.prepayYearly })\n      : baseline;\n    const { principal, schedule, totalBunga, totalPokok, totalBayar, firstPmt, afterPmt, periodeM } = actual;\n\n    // Headline cicilan — show scheduled bank payment (not extra)\n    $(\"r-cicilan\").textContent = fmtNum(firstPmt);\n\n    let subText = \"\";\n    if (state.jenis === \"Fixed\") {\n      subText = `Cicilan tetap selama <span class=\"num\">${state.tenor}<\u002Fspan> tahun · bunga <span class=\"num\">${fmtPct(state.fix)}<\u002Fspan>.`;\n    } else if (state.jenis === \"Floating\") {\n      subText = `Cicilan saat ini di bunga floating <span class=\"num\">${fmtPct(state.float)}<\u002Fspan>. Akan berubah jika bunga bank berubah.`;\n    } else if (state.jenis === \"Fixed+Floating\") {\n      subText = `Selama <span class=\"num\">${state.periode} thn<\u002Fspan> pertama (bunga <span class=\"num\">${fmtPct(state.fix)}<\u002Fspan>) · setelah itu <strong class=\"num\">${fmtRp(afterPmt)}<\u002Fstrong>/bln (floating <span class=\"num\">${fmtPct(state.float)}<\u002Fspan>).`;\n    } else {\n      subText = `Bunga floating <span class=\"num\">${fmtPct(state.float)}<\u002Fspan> dengan batas maksimum <span class=\"num\">${fmtPct(state.cap)}<\u002Fspan>.`;\n    }\n    if (state.prepayOn && state.prepayYearly > 0) {\n      subText += ` <span style=\"color:var(--accent-ink)\">+ <strong class=\"num\">${fmtRp(state.prepayYearly)}<\u002Fstrong>/tahun ekstra ke pokok<\u002Fspan>`;\n    }\n    $(\"r-sub\").innerHTML = subText;\n\n    // Status kelayakan — total monthly outgo including extra\n    const monthlyCommit = (state.jenis === \"Fixed+Floating\" ? Math.max(firstPmt, afterPmt) : firstPmt)\n      + (state.prepayOn ? state.prepayMonthly : 0);\n    const ratio = state.income > 0 ? monthlyCommit / state.income : 0;\n    const statusEl = $(\"r-status\");\n    statusEl.className = \"status\";\n    if (state.income <= 0) {\n      statusEl.classList.add(\"warn\");\n      statusEl.querySelector(\".icon\").textContent = \"?\";\n      $(\"r-status-t\").textContent = \"Isi penghasilan untuk cek kelayakan\";\n      $(\"r-status-d\").innerHTML = \"Aturan emas: cicilan maksimal 30% dari take-home pay.\";\n    } else if (ratio <= 0.30) {\n      statusEl.classList.add(\"ok\");\n      statusEl.querySelector(\".icon\").textContent = \"✓\";\n      $(\"r-status-t\").textContent = \"Aman — cicilan masih di bawah 30%\";\n      $(\"r-status-d\").innerHTML = `Rasio cicilan terhadap penghasilan: <span class=\"num\">${(ratio*100).toLocaleString(\"id-ID\",{maximumFractionDigits:1})}%<\u002Fspan>. Kondisi keuangan terkendali.`;\n    } else if (ratio <= 0.40) {\n      statusEl.classList.add(\"warn\");\n      statusEl.querySelector(\".icon\").textContent = \"!\";\n      $(\"r-status-t\").textContent = \"Perlu dipertimbangkan (30–40%)\";\n      $(\"r-status-d\").innerHTML = `Rasio cicilan: <span class=\"num\">${(ratio*100).toLocaleString(\"id-ID\",{maximumFractionDigits:1})}%<\u002Fspan>. Ruang anggaran lain akan terbatas.`;\n    } else {\n      statusEl.classList.add(\"bad\");\n      statusEl.querySelector(\".icon\").textContent = \"×\";\n      $(\"r-status-t\").textContent = \"Risiko tinggi — di atas 40%\";\n      $(\"r-status-d\").innerHTML = `Rasio cicilan: <span class=\"num\">${(ratio*100).toLocaleString(\"id-ID\",{maximumFractionDigits:1})}%<\u002Fspan>. Pertimbangkan tenor lebih panjang, DP lebih besar, atau rumah dengan harga lebih rendah.`;\n    }\n\n    // Metrics\n    $(\"r-pinjaman\").textContent = fmtShort(principal);\n    $(\"r-bunga\").textContent = fmtShort(totalBunga);\n    $(\"r-total\").textContent = fmtShort(totalBayar);\n\n    // Komposisi bar\n    const pokokPct = totalBayar > 0 ? (totalPokok / totalBayar * 100) : 0;\n    const bungaPct = 100 - pokokPct;\n    $(\"r-bar-pokok\").style.flex = pokokPct;\n    $(\"r-bar-bunga\").style.flex = bungaPct;\n    $(\"r-bar-pokok\").textContent = \"Pokok \" + pokokPct.toLocaleString(\"id-ID\",{maximumFractionDigits:1}) + \"%\";\n    $(\"r-bar-bunga\").textContent = \"Bunga \" + bungaPct.toLocaleString(\"id-ID\",{maximumFractionDigits:1}) + \"%\";\n    if (pokokPct < 12) $(\"r-bar-pokok\").textContent = \"\";\n    if (bungaPct < 12) $(\"r-bar-bunga\").textContent = \"\";\n    $(\"r-rasio-pb\").textContent = `Bunga = ${(totalBunga/Math.max(principal,1)*100).toLocaleString(\"id-ID\",{maximumFractionDigits:0})}% dari pokok`;\n\n    // Note\n    const notes = {\n      \"Fixed\": \"<b>Tipe Fixed:<\u002Fb> Cicilan stabil sepanjang tenor. Cocok untuk yang ingin pasti dan tidak terbebani fluktuasi bunga.\",\n      \"Floating\": \"<b>Tipe Floating:<\u002Fb> Cicilan menyesuaikan suku bunga acuan bank. Bisa lebih murah saat bunga turun, tapi berisiko saat bunga naik.\",\n      \"Fixed+Floating\": `<b>Tipe Fixed + Floating:<\u002Fb> Cicilan tetap selama <span class=\"num\">${state.periode}<\u002Fspan> tahun pertama, lalu menyesuaikan floating. Mayoritas KPR komersial di Indonesia menggunakan tipe ini.`,\n      \"Capped\": \"<b>Tipe Capped:<\u002Fb> Cicilan mengikuti floating tapi dibatasi bunga maksimum. Memberi proteksi saat bunga naik tajam.\",\n    };\n    $(\"r-note\").innerHTML = notes[state.jenis];\n\n    // Chart\n    drawChart(schedule);\n\n    // Table\n    renderTable(schedule);\n\n    $(\"t-meta\").textContent = `${schedule.length} bulan · ringkasan per tahun + detail bulan pertama`;\n\n    // ===== Savings card (Pelunasan Dipercepat) =====\n    const savingsEl = $(\"savings-card\");\n    if (state.prepayOn && state.prepayYearly > 0 && actual !== baseline) {\n      savingsEl.style.display = \"\";\n      const monthsSaved = baseline.schedule.length - actual.schedule.length;\n      const yrsSaved = Math.floor(monthsSaved / 12);\n      const monsRem = monthsSaved % 12;\n      const bungaHemat = baseline.totalBunga - actual.totalBunga;\n      const newTenorY = Math.floor(actual.schedule.length / 12);\n      const newTenorM = actual.schedule.length % 12;\n      $(\"s-tenor\").textContent = (yrsSaved > 0 ? yrsSaved + \" thn\" : \"\") + (monsRem > 0 ? \" \" + monsRem + \" bln\" : \"\") || \"—\";\n      $(\"s-tenor-sub\").textContent = `Lunas di ${newTenorY} thn${newTenorM ? \" \" + newTenorM + \" bln\" : \"\"} (dari ${state.tenor} thn)`;\n      $(\"s-bunga\").textContent = fmtShort(bungaHemat);\n      const pctHemat = baseline.totalBunga > 0 ? (bungaHemat / baseline.totalBunga * 100) : 0;\n      $(\"s-bunga-sub\").textContent = `Hemat ${pctHemat.toLocaleString(\"id-ID\",{maximumFractionDigits:1})}% dari bunga awal`;\n      $(\"s-extra-info\").innerHTML = `Dengan menyisihkan <strong class=\"num\">${fmtRp(state.prepayYearly)}<\u002Fstrong>/tahun ekstra ke pokok (misal dari THR atau bonus), kamu lunas <strong>${monthsSaved} bulan lebih awal<\u002Fstrong> dan menghemat <strong class=\"num\" style=\"color:var(--accent-ink)\">${fmtRp(bungaHemat)}<\u002Fstrong> dalam bunga.`;\n    } else {\n      savingsEl.style.display = \"none\";\n    }\n\n    // ===== Reverse Calculator =====\n    // (max harga rumah sekarang tampil sebagai Tip Kontekstual)\n  }\n\n  // ============ Chart (SVG) ============\n  function drawChart(schedule) {\n    const svg = $(\"chart\");\n    const W = 600, H = 200, padL = 36, padR = 12, padT = 12, padB = 24;\n    const cw = W - padL - padR, ch = H - padT - padB;\n\n    // Use actual years from schedule (may be < tenor if lunas dipercepat)\n    const years = Math.max(1, Math.ceil(schedule.length / 12));\n    const peryear = Array.from({length: years}, (_, i) => ({\n      year: i + 1, pokok: 0, bunga: 0, endBal: 0\n    }));\n    for (const r of schedule) {\n      const y = Math.ceil(r.m / 12);\n      if (y <= years) {\n        const slot = peryear[y - 1];\n        slot.pokok += r.pokok;\n        slot.bunga += r.bunga;\n        slot.endBal = r.balance;\n      }\n    }\n    const maxAng = Math.max(1, ...peryear.map(p => p.pokok + p.bunga));\n    const initBal = schedule[0] ? (schedule[0].balance + schedule[0].pokok) : 1;\n    const maxBal = Math.max(1, initBal);\n\n    const yScale = (v, max) => ch - (v / max) * ch;\n    const xFor = (i) => padL + (i + 0.5) * (cw / years);\n    const barW = Math.min(28, (cw / years) * 0.6);\n\n    let html = \"\";\n\n    // grid lines\n    html += `<g class=\"grid\">`;\n    for (let i = 0; i <= 4; i++) {\n      const y = padT + (ch * i / 4);\n      html += `<line x1=\"${padL}\" x2=\"${W-padR}\" y1=\"${y}\" y2=\"${y}\"/>`;\n    }\n    html += `<\u002Fg>`;\n\n    // Y axis labels (left = ang, right is implicit balance)\n    html += `<g class=\"axis\">`;\n    for (let i = 0; i <= 4; i++) {\n      const v = maxAng * (1 - i / 4);\n      const y = padT + (ch * i / 4) + 3;\n      html += `<text x=\"${padL - 6}\" y=\"${y}\" text-anchor=\"end\">${shortAxis(v)}<\u002Ftext>`;\n    }\n    html += `<\u002Fg>`;\n\n    // X axis labels — every 5 years\n    html += `<g class=\"axis\">`;\n    for (let i = 0; i < years; i++) {\n      const y = i + 1;\n      if (y === 1 || y % 5 === 0 || y === years) {\n        html += `<text x=\"${xFor(i)}\" y=\"${H - 6}\" text-anchor=\"middle\">Th ${y}<\u002Ftext>`;\n      }\n    }\n    html += `<\u002Fg>`;\n\n    // Bars: pokok (bottom) + bunga (top)\n    peryear.forEach((p, i) => {\n      const total = p.pokok + p.bunga;\n      const hTotal = (total / maxAng) * ch;\n      const hPokok = (p.pokok / maxAng) * ch;\n      const x = xFor(i) - barW / 2;\n      const yBot = padT + ch;\n      // bunga on top\n      html += `<rect x=\"${x}\" y=\"${yBot - hTotal}\" width=\"${barW}\" height=\"${hTotal - hPokok}\" fill=\"oklch(0.68 0.090 50)\" rx=\"2\"/>`;\n      // pokok on bottom\n      html += `<rect x=\"${x}\" y=\"${yBot - hPokok}\" width=\"${barW}\" height=\"${hPokok}\" fill=\"oklch(0.48 0.085 150)\" rx=\"2\"/>`;\n    });\n\n    // Line: balance at end of each year\n    const pts = peryear.map((p, i) => `${xFor(i)},${padT + yScale(p.endBal, maxBal)}`).join(\" \");\n    html += `<polyline points=\"${pts}\" fill=\"none\" stroke=\"oklch(0.22 0.012 60)\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"/>`;\n    peryear.forEach((p, i) => {\n      html += `<circle cx=\"${xFor(i)}\" cy=\"${padT + yScale(p.endBal, maxBal)}\" r=\"2.5\" fill=\"white\" stroke=\"oklch(0.22 0.012 60)\" stroke-width=\"1.5\"/>`;\n    });\n\n    svg.innerHTML = html;\n  }\n\n  function shortAxis(v) {\n    if (v >= 1e9) return (v/1e9).toLocaleString(\"id-ID\",{maximumFractionDigits:1}) + \"M\";\n    if (v >= 1e6) return (v/1e6).toLocaleString(\"id-ID\",{maximumFractionDigits:0}) + \"jt\";\n    if (v >= 1e3) return (v/1e3).toFixed(0) + \"rb\";\n    return Math.round(v).toString();\n  }\n\n  // ============ Table ============\n  function renderTable(schedule) {\n    const tbody = $(\"t-body\");\n    const rows = [];\n    // Show months 1-12, then year summaries for rest\n    schedule.forEach(r => {\n      if (r.m <= 12) rows.push({ kind: \"m\", r });\n    });\n    // Year summaries (year 1 included as well so user sees rollup)\n    const years = Math.ceil(schedule.length / 12);\n    for (let y = 1; y <= years; y++) {\n      const slice = schedule.filter(x => Math.ceil(x.m/12) === y);\n      if (!slice.length) continue;\n      const bunga = slice.reduce((s,x) => s + x.bunga, 0);\n      const pokok = slice.reduce((s,x) => s + x.pokok, 0);\n      const total = slice.reduce((s,x) => s + x.total, 0);\n      const balance = slice[slice.length-1].balance;\n      const rate = slice[0].rate;\n      rows.push({ kind: \"y\", y, rate, bunga, pokok, total, balance });\n    }\n    tbody.innerHTML = rows.map(row => {\n      if (row.kind === \"m\") {\n        const r = row.r;\n        return `<tr>\n          <td>${r.m}<\u002Ftd>\n          <td>${fmtPct(r.rate*100)}<\u002Ftd>\n          <td>${fmtNum(r.bunga)}<\u002Ftd>\n          <td>${fmtNum(r.pokok)}<\u002Ftd>\n          <td>${fmtNum(r.total)}<\u002Ftd>\n          <td>${fmtNum(r.balance)}<\u002Ftd>\n        <\u002Ftr>`;\n      } else {\n        return `<tr class=\"year-row\">\n          <td>Tahun ${row.y}<\u002Ftd>\n          <td>${fmtPct(row.rate*100)}<\u002Ftd>\n          <td>${fmtNum(row.bunga)}<\u002Ftd>\n          <td>${fmtNum(row.pokok)}<\u002Ftd>\n          <td>${fmtNum(row.total)}<\u002Ftd>\n          <td>${fmtNum(row.balance)}<\u002Ftd>\n        <\u002Ftr>`;\n      }\n    }).join(\"\");\n  }\n\n  // ============ Tips Kontekstual ============\n  function computeTips(baseline) {\n    const tips = [];\n    const ratio = state.income > 0 ? baseline.firstPmt / state.income : 0;\n    const monthlyCommit = baseline.firstPmt + (state.prepayOn ? state.prepayMonthly : 0);\n    const fullRatio = state.income > 0 ? monthlyCommit / state.income : 0;\n\n    // helper: trial run with temporary state override\n    function trial(overrides) {\n      const old = { ...state };\n      Object.assign(state, overrides);\n      const r = buildSchedule();\n      Object.assign(state, old);\n      return r;\n    }\n\n    // No income filled\n    if (state.income <= 0) {\n      tips.push({\n        level: \"info\", ico: \"💼\", t: \"Isi penghasilan bulanan dulu\",\n        d: \"Kami akan otomatis cek apakah cicilan masuk batas aman dan hitung harga rumah maksimal yang sanggup kamu beli.\"\n      });\n    }\n\n    // High ratio — suggest longer tenor\n    if (state.income > 0 && fullRatio > 0.30 && state.tenor < 30) {\n      const newTenor = Math.min(30, state.tenor + 5);\n      const r = trial({ tenor: newTenor });\n      const newCic = r.firstPmt + (state.prepayOn ? state.prepayMonthly : 0);\n      const newRatio = newCic / state.income;\n      if (newRatio < fullRatio) {\n        tips.push({\n          level: \"warn\", ico: \"📅\",\n          t: `Coba tenor ${newTenor} tahun untuk meringankan cicilan`,\n          d: `Cicilan turun ke <strong>${fmtRp(r.firstPmt)}<\u002Fstrong>/bln (rasio <strong>${(newRatio*100).toLocaleString(\"id-ID\",{maximumFractionDigits:1})}%<\u002Fstrong>). Konsekuensi: total bunga jadi <strong>${fmtShort(r.totalBunga)}<\u002Fstrong> (naik ${fmtShort(r.totalBunga - baseline.totalBunga)}).`\n        });\n      }\n    }\n\n    // High ratio — suggest higher DP\n    if (state.income > 0 && fullRatio > 0.30 && state.dpPct < 50) {\n      const newDp = Math.min(50, state.dpPct + 10);\n      const r = trial({ dpPct: newDp });\n      const newCic = r.firstPmt + (state.prepayOn ? state.prepayMonthly : 0);\n      const newRatio = newCic / state.income;\n      const extraDp = (state.harga * newDp / 100) - (state.harga * state.dpPct / 100);\n      tips.push({\n        level: \"warn\", ico: \"💰\",\n        t: `Naikkan DP jadi ${newDp}% (tambah ${fmtShort(extraDp)})`,\n        d: `Cicilan turun ke <strong>${fmtRp(r.firstPmt)}<\u002Fstrong>/bln (rasio <strong>${(newRatio*100).toLocaleString(\"id-ID\",{maximumFractionDigits:1})}%<\u002Fstrong>) dan total bunga hemat <strong>${fmtShort(baseline.totalBunga - r.totalBunga)}<\u002Fstrong>.`\n      });\n    }\n\n    // Rumah maks. yang sanggup dibeli (selalu tampil saat income terisi)\n    if (state.income > 0) {\n      const rev = reverseCalc();\n      if (rev && rev.maxHarga > 0 && isFinite(rev.maxHarga)) {\n        const safePrice = Math.floor(rev.maxHarga / 10_000_000) * 10_000_000;\n        const tooExpensive = safePrice < state.harga;\n        tips.push({\n          level: tooExpensive ? \"warn\" : \"info\",\n          ico: \"🏠\",\n          t: tooExpensive\n            ? `Rumah maks. yang sanggup kamu beli: ${fmtShort(safePrice)}`\n            : `Kamu sanggup beli rumah sampai ${fmtShort(safePrice)}`,\n          d: `Dengan penghasilan <strong>${fmtRp(state.income)}<\u002Fstrong>/bln, tenor <strong>${state.tenor}<\u002Fstrong> thn, dan cicilan ≤30% income. Estimasi: DP <strong>${fmtShort(rev.maxDp)}<\u002Fstrong> · cicilan ~<strong>${fmtRp(rev.maxCicilan)}<\u002Fstrong>/bln.`\n            + (tooExpensive\n              ? ` Harga saat ini (<strong>${fmtShort(state.harga)}<\u002Fstrong>) di atas batas aman.`\n              : ` Harga saat ini (<strong>${fmtShort(state.harga)}<\u002Fstrong>) masih dalam batas aman.`)\n            + ` <button class=\"tip-btn\" data-act=\"apply-max\" data-target=\"${safePrice}\">Gunakan harga ini →<\u002Fbutton>`\n        });\n      }\n    }\n\n    // Fixed+Floating stress test\n    if (state.jenis === \"Fixed+Floating\" && state.income > 0) {\n      const stressFloat = state.float + 2;\n      const r = trial({ float: stressFloat });\n      const futureRatio = r.afterPmt / state.income;\n      tips.push({\n        level: \"info\", ico: \"⚠️\",\n        t: `Stress test: kalau floating naik jadi ${fmtPct(stressFloat)}`,\n        d: `Setelah ${state.periode} tahun masa fixed habis, cicilan jadi <strong>${fmtRp(r.afterPmt)}<\u002Fstrong>/bln (naik ${fmtRp(r.afterPmt - baseline.afterPmt)} vs sekarang, rasio ${(futureRatio*100).toLocaleString(\"id-ID\",{maximumFractionDigits:1})}% income). Bunga floating bank historis bisa naik 1–3% saat BI rate naik.`\n      });\n    }\n\n    // Long tenor warning\n    if (state.tenor >= 25) {\n      const r = trial({ tenor: 20 });\n      const extraBunga = baseline.totalBunga - r.totalBunga;\n      const extraCic = r.firstPmt - baseline.firstPmt;\n      if (extraBunga > 0) {\n        tips.push({\n          level: \"info\", ico: \"⏳\",\n          t: `Tenor ${state.tenor} thn = bayar bunga ekstra ${fmtShort(extraBunga)}`,\n          d: `Dibanding tenor 20 thn, cicilan cuma beda <strong>${fmtRp(extraCic)}<\u002Fstrong>/bln tapi kamu bayar tambahan bunga <strong>${fmtShort(extraBunga)}<\u002Fstrong> selama masa KPR. Pertimbangkan tenor lebih pendek kalau cashflow memungkinkan.`\n        });\n      }\n    }\n\n    // Low DP warning\n    if (state.dpPct > 0 && state.dpPct < 20) {\n      tips.push({\n        level: \"info\", ico: \"🛡️\",\n        t: \"DP di bawah 20% biasanya kena biaya tambahan\",\n        d: \"Bank umumnya mewajibkan asuransi kredit tambahan dan bunga bisa lebih tinggi 0.25–0.5% untuk DP rendah. Aturan LTV BI juga membatasi DP minimum (umumnya 15% untuk rumah pertama).\"\n      });\n    }\n\n    // Surplus budget — suggest yearly prepay\n    if (state.income > 0 && fullRatio > 0 && fullRatio < 0.20 && !state.prepayOn) {\n      // Suggest setting aside ~1 month's surplus per year (≈ THR equivalent)\n      const surplus = state.income * 0.30 - baseline.firstPmt;\n      const yearlyExtra = Math.max(0, Math.floor((surplus * 12 * 0.4) / 1_000_000) * 1_000_000);\n      if (yearlyExtra >= 1_000_000) {\n        const old = { ...state };\n        state.prepayOn = true;\n        state.prepayYearly = yearlyExtra;\n        const out = buildSchedule({ extraMonthly: 0, lumpYearly: yearlyExtra });\n        Object.assign(state, old);\n        const monthsSaved = baseline.schedule.length - out.schedule.length;\n        const bungaHemat = baseline.totalBunga - out.totalBunga;\n        if (monthsSaved > 0) {\n          tips.push({\n            level: \"ok\", ico: \"✨\",\n            t: \"Ruang anggaran masih lega — manfaatkan THR/bonus untuk pelunasan\",\n            d: `Sisihkan <strong>${fmtRp(yearlyExtra)}<\u002Fstrong>/tahun (misal dari THR atau bonus) ke pokok pinjaman. Hasilnya: lunas <strong>${monthsSaved} bulan lebih awal<\u002Fstrong> dan hemat bunga <strong>${fmtShort(bungaHemat)}<\u002Fstrong>. Aktifkan toggle \"Pelunasan Dipercepat\" di panel kiri.`\n          });\n        }\n      }\n    }\n\n    // Bank not picked\n    if (state.bank === \"-- Pilih Bank --\") {\n      tips.push({\n        level: \"info\", ico: \"🏦\",\n        t: \"Pilih bank di panel kiri untuk suku bunga referensi\",\n        d: \"Suku bunga preset diambil dari rate publik per Mei 2025. Bunga aktual bisa berbeda tergantung profil pemohon, promo, dan negosiasi langsung dengan bank.\"\n      });\n    }\n\n    // All good\n    if (tips.length === 0 && state.income > 0) {\n      tips.push({\n        level: \"ok\", ico: \"✓\",\n        t: \"Skenario ini sudah cukup sehat\",\n        d: \"Cicilan masuk batas aman, parameter masuk akal. Skenario ini bisa kamu jadikan acuan saat ngobrol dengan bank.\"\n      });\n    }\n\n    return tips;\n  }\n\n  function renderTips(baseline) {\n    const list = document.getElementById(\"tips-list\");\n    const tips = computeTips(baseline);\n    list.innerHTML = tips.map(t => `\n      <div class=\"tip ${t.level}\">\n        <div class=\"ico\">${t.ico}<\u002Fdiv>\n        <div class=\"body\">\n          <div class=\"t\">${t.t}<\u002Fdiv>\n          <div class=\"d\">${t.d}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    `).join(\"\");\n  }\n\n  // Delegated handler for action buttons inside tips\n  document.getElementById(\"tips-list\").addEventListener(\"click\", (e) => {\n    const btn = e.target.closest(\"button[data-act]\");\n    if (!btn) return;\n    if (btn.dataset.act === \"apply-max\") {\n      const target = +btn.dataset.target;\n      if (target > 0) {\n        state.harga = target;\n        iHarga.value = target.toLocaleString(\"id-ID\");\n        setChipActive(\"chips-harga\", target);\n        recalc();\n        iHarga.focus();\n      }\n    }\n  });\n\n  // Hook tips into recalc\n  const _origRecalc = recalc;\n  recalc = function() {\n    _origRecalc();\n    const baseline = buildSchedule();\n    renderTips(baseline);\n  };\n\n  recalc();\n\n  // ============ Print / Save as PDF ============\n  const printBtn = $(\"btn-print\");\n  const printDate = $(\"print-date\");\n  const detailsCard = document.querySelector(\"details.table-card\");\n\n  function setPrintMeta() {\n    const d = new Date();\n    const fmt = d.toLocaleDateString(\"id-ID\", { day: \"numeric\", month: \"long\", year: \"numeric\" })\n              + \" · \" + d.toLocaleTimeString(\"id-ID\", { hour: \"2-digit\", minute: \"2-digit\" });\n    printDate.textContent = \"Dicetak: \" + fmt;\n  }\n\n  let _wasOpen = false;\n  function beforePrint() {\n    setPrintMeta();\n    _wasOpen = detailsCard.open;\n    detailsCard.open = true;\n  }\n  function afterPrint() {\n    detailsCard.open = _wasOpen;\n  }\n\n  printBtn.addEventListener(\"click\", () => {\n    beforePrint();\n    // give layout a tick to reflow the now-open details table before print\n    setTimeout(() => window.print(), 60);\n  });\n\n  window.addEventListener(\"beforeprint\", beforePrint);\n  window.addEventListener(\"afterprint\", afterPrint);\n<\u002Fscript>\n\n<script>\n  // =====================================================================\n  //  Lapisan Produk: Penyimpanan lokal, Skenario, Bandingkan, Onboarding\n  //  (Semua data hanya di localStorage perangkat ini.)\n  // =====================================================================\n  (function () {\n    const CUR_KEY = \"nakahome_kpr_current\";\n    const SCN_KEY = \"nakahome_kpr_scenarios\";\n    const ACT_KEY = \"nakahome_kpr_active\";\n    const ONB_KEY = \"nakahome_kpr_onboarded_v1\";\n\n    const STATE_KEYS = [\"harga\",\"dpPct\",\"biayaPct\",\"tenor\",\"jenis\",\"bank\",\"fix\",\"periode\",\"float\",\"cap\",\"income\",\"prepayOn\",\"prepayMonthly\",\"prepayYearly\"];\n    const DEFAULTS = {\n      harga: 1_000_000_000, dpPct: 20, biayaPct: 8, tenor: 20, jenis: \"Fixed\",\n      bank: \"-- Pilih Bank --\", fix: 7.00, periode: 3, float: 10.50, cap: 12.00,\n      income: 15_000_000, prepayOn: false, prepayMonthly: 0, prepayYearly: 10_000_000,\n    };\n\n    let scenarios = [];\n    let activeId = null;\n    let dirty = false;\n\n    const escapeHtml = (s) => String(s).replace(/[&<>\"']/g, m => ({ \"&\":\"&amp;\",\"<\":\"&lt;\",\">\":\"&gt;\",'\"':\"&quot;\",\"'\":\"&#39;\" }[m]));\n    const truncate = (s, n = 22) => s.length > n ? s.slice(0, n - 1) + \"…\" : s;\n    const snapshotState = () => { const o = {}; STATE_KEYS.forEach(k => o[k] = state[k]); return o; };\n\n    // ---- localStorage helpers (gagal diam-diam jika storage diblokir) ----\n    function persistCurrent() { try { localStorage.setItem(CUR_KEY, JSON.stringify(snapshotState())); } catch (e) {} }\n    function persistScenarios() {\n      try {\n        localStorage.setItem(SCN_KEY, JSON.stringify(scenarios));\n        if (activeId) localStorage.setItem(ACT_KEY, activeId); else localStorage.removeItem(ACT_KEY);\n      } catch (e) {}\n    }\n\n    // ---- Sinkronkan field input dari state ----\n    function syncInputsFromState() {\n      iHarga.value = (state.harga || 0).toLocaleString(\"id-ID\");\n      setChipActive(\"chips-harga\", state.harga);\n      iDpPct.value = state.dpPct;\n      setChipActive(\"chips-dp\", state.dpPct);\n      iBiayaPct.value = state.biayaPct;\n      iTenor.value = state.tenor;\n      setChipActive(\"chips-tenor\", state.tenor);\n      document.querySelectorAll(\"#seg-jenis button\").forEach(b => b.classList.toggle(\"active\", b.dataset.v === state.jenis));\n      $(\"hint-jenis\").textContent = \"\";\n      iBank.value = state.bank;\n      iFix.value = (+state.fix).toFixed(2);\n      iPeriode.value = state.periode;\n      iFloat.value = (+state.float).toFixed(2);\n      iCap.value = (+state.cap).toFixed(2);\n      iIncome.value = (state.income || 0).toLocaleString(\"id-ID\");\n      setChipActive(\"chips-income\", state.income);\n      iPrepayOn.checked = !!state.prepayOn;\n      prepayBody.hidden = !state.prepayOn;\n      iPrepayYearly.value = (state.prepayYearly || 0).toLocaleString(\"id-ID\");\n      setChipActive(\"chips-prepay-yearly\", state.prepayYearly);\n    }\n\n    // ---- Ringkas state mana pun jadi metrik (untuk chip & perbandingan) ----\n    function summarize(st) {\n      const old = snapshotState();\n      Object.assign(state, st);\n      const base = buildSchedule();\n      const actual = state.prepayOn\n        ? buildSchedule({ extraMonthly: state.prepayMonthly || 0, lumpYearly: state.prepayYearly || 0 })\n        : base;\n      const ratio = state.income > 0 ? base.firstPmt / state.income : 0;\n      const o = {\n        harga: state.harga, dpPct: state.dpPct, dpRp: base.dpRp, principal: base.principal,\n        tenor: state.tenor, jenis: state.jenis, fix: state.fix, float: state.float, periode: state.periode, cap: state.cap,\n        income: state.income, firstPmt: base.firstPmt, afterPmt: base.afterPmt,\n        totalBunga: actual.totalBunga, totalBayar: actual.totalBayar, months: actual.schedule.length,\n        prepayOn: state.prepayOn, prepayYearly: state.prepayYearly, ratio,\n      };\n      Object.assign(state, old);\n      return o;\n    }\n\n    function rateLabel(o) {\n      if (o.jenis === \"Fixed\") return fmtPct(o.fix) + \" fixed\";\n      if (o.jenis === \"Floating\") return fmtPct(o.float) + \" floating\";\n      if (o.jenis === \"Capped\") return fmtPct(o.float) + \" · cap \" + fmtPct(o.cap);\n      return fmtPct(o.fix) + \" → \" + fmtPct(o.float);\n    }\n    function statusOf(o) {\n      if (o.income <= 0) return { cls: \"warn\", txt: \"—\" };\n      const r = o.ratio;\n      if (r <= 0.30) return { cls: \"ok\", txt: (r * 100).toLocaleString(\"id-ID\", { maximumFractionDigits: 1 }) + \"%\" };\n      if (r <= 0.40) return { cls: \"warn\", txt: (r * 100).toLocaleString(\"id-ID\", { maximumFractionDigits: 1 }) + \"%\" };\n      return { cls: \"bad\", txt: (r * 100).toLocaleString(\"id-ID\", { maximumFractionDigits: 1 }) + \"%\" };\n    }\n\n    // ---- Render bar skenario ----\n    function renderScenarioBar() {\n      const wrap = $(\"ws-chips\");\n      if (!scenarios.length) {\n        wrap.innerHTML = `<span class=\"ws-empty\">Belum ada skenario tersimpan. Atur simulasi lalu klik <strong>Simpan Skenario<\u002Fstrong>.<\u002Fspan>`;\n      } else {\n        wrap.innerHTML = scenarios.map(sc => {\n          const sum = summarize(sc.state);\n          const active = sc.id === activeId;\n          return `<button class=\"ws-chip ${active ? \"active\" : \"\"} ${active && dirty ? \"dirty\" : \"\"}\" data-id=\"${sc.id}\" type=\"button\">\n            <span class=\"ws-chip-name\">${escapeHtml(truncate(sc.name, 20))}<\u002Fspan>\n            <span class=\"ws-chip-sub\">${fmtShort(sum.firstPmt)}/bln · ${fmtShort(sum.harga)}<\u002Fspan>\n            <span class=\"ws-chip-del\" data-del=\"${sc.id}\" title=\"Hapus skenario\">&times;<\u002Fspan>\n          <\u002Fbutton>`;\n        }).join(\"\");\n      }\n      $(\"ws-compare\").disabled = scenarios.length < 2;\n      updateBarState();\n    }\n\n    // ---- Update ringan (kelas aktif/dirty + label tombol) tiap recalc ----\n    function updateBarState() {\n      let d = false;\n      if (activeId) {\n        const sc = scenarios.find(x => x.id === activeId);\n        if (sc) d = JSON.stringify(sc.state) !== JSON.stringify(snapshotState());\n        else activeId = null;\n      }\n      dirty = d;\n      document.querySelectorAll(\".ws-chip\").forEach(ch => {\n        const on = ch.dataset.id === activeId;\n        ch.classList.toggle(\"active\", on);\n        ch.classList.toggle(\"dirty\", on && dirty);\n      });\n      const lbl = $(\"ws-save\").querySelector(\"span\");\n      if (lbl) lbl.textContent = (activeId && dirty) ? \"Simpan Perubahan\" : \"Simpan Skenario\";\n    }\n\n    function loadScenario(id) {\n      const sc = scenarios.find(x => x.id === id);\n      if (!sc) return;\n      Object.assign(state, sc.state);\n      activeId = id; dirty = false;\n      syncInputsFromState();\n      recalc();\n      persistScenarios();\n      renderScenarioBar();\n      window.scrollTo({ top: 0, behavior: \"smooth\" });\n    }\n\n    function deleteScenario(id) {\n      const sc = scenarios.find(x => x.id === id);\n      if (!sc) return;\n      openConfirm(\"Hapus skenario?\", `Skenario <strong>“${escapeHtml(sc.name)}”<\u002Fstrong> akan dihapus permanen dari perangkat ini.`, \"Hapus\", () => {\n        scenarios = scenarios.filter(x => x.id !== id);\n        if (activeId === id) activeId = null;\n        persistScenarios();\n        renderScenarioBar();\n      });\n      $(\"confirm-ok\").className = \"btn-danger\";\n    }\n\n    // ---- Modal simpan ----\n    function openSave() {\n      const sc = activeId ? scenarios.find(x => x.id === activeId) : null;\n      const nameInput = $(\"save-name\");\n      nameInput.value = sc ? sc.name : (\"Rumah \" + fmtShort(state.harga));\n      const upd = $(\"save-update\");\n      if (sc) { upd.style.display = \"\"; upd.textContent = \"Perbarui “\" + truncate(sc.name, 16) + \"”\"; }\n      else { upd.style.display = \"none\"; }\n      showOverlay(\"modal-save\");\n      setTimeout(() => { nameInput.focus(); nameInput.select(); }, 60);\n    }\n    function doSaveNew() {\n      const name = ($(\"save-name\").value || \"\").trim() || (\"Skenario \" + (scenarios.length + 1));\n      const id = \"s\" + Date.now().toString(36) + Math.floor(Math.random() * 1000);\n      scenarios.push({ id, name, createdAt: Date.now(), state: snapshotState() });\n      activeId = id; dirty = false;\n      persistScenarios(); renderScenarioBar(); hideOverlays();\n    }\n    function doSaveUpdate() {\n      const sc = scenarios.find(x => x.id === activeId);\n      if (!sc) return doSaveNew();\n      sc.name = ($(\"save-name\").value || \"\").trim() || sc.name;\n      sc.state = snapshotState(); sc.updatedAt = Date.now();\n      dirty = false;\n      persistScenarios(); renderScenarioBar(); hideOverlays();\n    }\n\n    // ---- Bandingkan ----\n    let cmpSel = [];\n    function openCompare() {\n      cmpSel = scenarios.slice(0, 4).map(s => s.id);\n      renderCompare();\n      showOverlay(\"modal-compare\");\n    }\n    function renderCompare() {\n      const pick = $(\"cmp-pick\");\n      pick.innerHTML = scenarios.map(s => {\n        const on = cmpSel.includes(s.id);\n        const dim = !on && cmpSel.length >= 4;\n        return `<label class=\"${on ? \"on\" : \"\"} ${dim ? \"dim\" : \"\"}\">\n          <input type=\"checkbox\" ${on ? \"checked\" : \"\"} data-cmp=\"${s.id}\" /> ${escapeHtml(truncate(s.name, 24))}<\u002Flabel>`;\n      }).join(\"\");\n\n      const cols = cmpSel.map(id => scenarios.find(s => s.id === id)).filter(Boolean);\n      const result = $(\"cmp-result\");\n      if (cols.length < 2) {\n        result.innerHTML = `<div class=\"cmp-empty\">Pilih minimal 2 skenario untuk dibandingkan.<\u002Fdiv>`;\n        return;\n      }\n      const sums = cols.map(c => ({ name: c.name, o: summarize(c.state) }));\n      const anyFF = sums.some(s => s.o.jenis === \"Fixed+Floating\");\n      const anyIncome = sums.some(s => s.o.income > 0);\n      const anyPrepay = sums.some(s => s.o.prepayOn);\n\n      const minFirst = Math.min(...sums.map(s => s.o.firstPmt));\n      const minBunga = Math.min(...sums.map(s => s.o.totalBunga));\n      const minBayar = Math.min(...sums.map(s => s.o.totalBayar));\n\n      const cell = (val, isBest) => `<td class=\"${isBest ? \"cmp-best\" : \"\"}\">${val}<\u002Ftd>`;\n      const rows = [];\n      rows.push(`<tr><td>Cicilan / bulan<\u002Ftd>${sums.map(s => cell(fmtRp(s.o.firstPmt), s.o.firstPmt === minFirst)).join(\"\")}<\u002Ftr>`);\n      if (anyFF) rows.push(`<tr><td>Setelah masa fixed<\u002Ftd>${sums.map(s => `<td>${s.o.jenis === \"Fixed+Floating\" ? fmtRp(s.o.afterPmt) : \"—\"}<\u002Ftd>`).join(\"\")}<\u002Ftr>`);\n      rows.push(`<tr><td>Harga rumah<\u002Ftd>${sums.map(s => `<td>${fmtShort(s.o.harga)}<\u002Ftd>`).join(\"\")}<\u002Ftr>`);\n      rows.push(`<tr><td>Uang muka (DP)<\u002Ftd>${sums.map(s => `<td>${fmtShort(s.o.dpRp)} · ${s.o.dpPct}%<\u002Ftd>`).join(\"\")}<\u002Ftr>`);\n      rows.push(`<tr><td>Total pinjaman<\u002Ftd>${sums.map(s => `<td>${fmtShort(s.o.principal)}<\u002Ftd>`).join(\"\")}<\u002Ftr>`);\n      rows.push(`<tr><td>Tenor<\u002Ftd>${sums.map(s => `<td>${s.o.tenor} thn<\u002Ftd>`).join(\"\")}<\u002Ftr>`);\n      rows.push(`<tr><td>Jenis KPR<\u002Ftd>${sums.map(s => `<td style=\"font-family:'Plus Jakarta Sans',sans-serif\">${s.o.jenis}<\u002Ftd>`).join(\"\")}<\u002Ftr>`);\n      rows.push(`<tr><td>Bunga<\u002Ftd>${sums.map(s => `<td>${rateLabel(s.o)}<\u002Ftd>`).join(\"\")}<\u002Ftr>`);\n      rows.push(`<tr><td>Total bunga<\u002Ftd>${sums.map(s => cell(fmtShort(s.o.totalBunga), s.o.totalBunga === minBunga)).join(\"\")}<\u002Ftr>`);\n      rows.push(`<tr><td>Total pembayaran<\u002Ftd>${sums.map(s => cell(fmtShort(s.o.totalBayar), s.o.totalBayar === minBayar)).join(\"\")}<\u002Ftr>`);\n      if (anyIncome) rows.push(`<tr><td>Rasio cicilan<\u002Ftd>${sums.map(s => { const st = statusOf(s.o); return `<td><span class=\"cmp-badge ${st.cls}\">${st.txt}<\u002Fspan><\u002Ftd>`; }).join(\"\")}<\u002Ftr>`);\n      if (anyPrepay) rows.push(`<tr><td>Pelunasan dipercepat<\u002Ftd>${sums.map(s => `<td>${s.o.prepayOn ? fmtShort(s.o.prepayYearly) + \"/thn\" : \"—\"}<\u002Ftd>`).join(\"\")}<\u002Ftr>`);\n\n      result.innerHTML = `\n        <div class=\"cmp-scroll\">\n          <table class=\"cmp-table\">\n            <thead><tr><th><\u002Fth>${sums.map(s => `<th>${escapeHtml(truncate(s.name, 18))}<\u002Fth>`).join(\"\")}<\u002Ftr><\u002Fthead>\n            <tbody>${rows.join(\"\")}<\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n        <div class=\"cmp-note\">✦ menandai nilai terbaik di tiap baris (cicilan, bunga, dan total pembayaran terendah). Estimasi untuk perencanaan — bukan penawaran resmi bank.<\u002Fdiv>`;\n    }\n\n    // ---- Konfirmasi generik ----\n    let confirmCb = null;\n    function openConfirm(title, body, okLabel, cb) {\n      $(\"confirm-title\").textContent = title;\n      $(\"confirm-body\").innerHTML = body;\n      $(\"confirm-ok\").textContent = okLabel;\n      confirmCb = cb;\n      showOverlay(\"modal-confirm\");\n    }\n\n    // ---- Reset & hapus ----\n    function resetDefault() {\n      openConfirm(\"Reset ke pengaturan awal?\", \"Input simulasi saat ini dikembalikan ke nilai default. <strong>Skenario tersimpan tidak ikut terhapus.<\u002Fstrong>\", \"Reset\", () => {\n        Object.assign(state, DEFAULTS);\n        activeId = null;\n        syncInputsFromState(); recalc();\n        persistScenarios(); renderScenarioBar();\n      });\n      $(\"confirm-ok\").className = \"btn-save\";\n    }\n    function clearAll() {\n      openConfirm(\"Hapus semua data?\", \"<strong>Semua skenario tersimpan<\u002Fstrong> dan input akan dihapus dari perangkat ini. Tindakan ini tidak bisa dibatalkan.\", \"Hapus Semua\", () => {\n        scenarios = []; activeId = null;\n        try { localStorage.removeItem(SCN_KEY); localStorage.removeItem(ACT_KEY); localStorage.removeItem(CUR_KEY); } catch (e) {}\n        Object.assign(state, DEFAULTS);\n        syncInputsFromState(); recalc(); renderScenarioBar();\n      });\n      $(\"confirm-ok\").className = \"btn-danger\";\n    }\n\n    // ---- Overlay control ----\n    function showOverlay(id) { hideOverlays(); $(id).classList.add(\"show\"); }\n    function hideOverlays() { document.querySelectorAll(\".overlay\").forEach(o => { if (o.dataset.dismiss !== \"0\") o.classList.remove(\"show\"); }); }\n\n    // ============ Wiring ============\n    $(\"ws-save\").addEventListener(\"click\", openSave);\n    $(\"ws-compare\").addEventListener(\"click\", openCompare);\n    $(\"save-new\").addEventListener(\"click\", doSaveNew);\n    $(\"save-update\").addEventListener(\"click\", doSaveUpdate);\n    $(\"save-name\").addEventListener(\"keydown\", e => { if (e.key === \"Enter\") { e.preventDefault(); ($(\"save-update\").style.display === \"none\" ? doSaveNew : doSaveUpdate)(); } });\n\n    // chips: load / delete (delegated)\n    $(\"ws-chips\").addEventListener(\"click\", e => {\n      const del = e.target.closest(\"[data-del]\");\n      if (del) { e.stopPropagation(); deleteScenario(del.dataset.del); return; }\n      const chip = e.target.closest(\".ws-chip\");\n      if (chip) loadScenario(chip.dataset.id);\n    });\n\n    // kebab menu\n    const pop = $(\"ws-pop\");\n    $(\"ws-menu\").addEventListener(\"click\", e => { e.stopPropagation(); pop.classList.toggle(\"show\"); });\n    document.addEventListener(\"click\", e => { if (!e.target.closest(\"#ws-pop\") && !e.target.closest(\"#ws-menu\")) pop.classList.remove(\"show\"); });\n    $(\"pop-reset\").addEventListener(\"click\", () => { pop.classList.remove(\"show\"); resetDefault(); });\n    $(\"pop-clear\").addEventListener(\"click\", () => { pop.classList.remove(\"show\"); clearAll(); });\n\n    // compare checkboxes (delegated)\n    $(\"cmp-pick\").addEventListener(\"change\", e => {\n      const cb = e.target.closest(\"input[data-cmp]\");\n      if (!cb) return;\n      const id = cb.dataset.cmp;\n      if (cb.checked) { if (cmpSel.length < 4 && !cmpSel.includes(id)) cmpSel.push(id); }\n      else { cmpSel = cmpSel.filter(x => x !== id); }\n      renderCompare();\n    });\n\n    // confirm + close buttons\n    $(\"confirm-ok\").addEventListener(\"click\", () => { const cb = confirmCb; confirmCb = null; hideOverlays(); if (cb) cb(); });\n    document.querySelectorAll(\".overlay [data-close]\").forEach(b => b.addEventListener(\"click\", hideOverlays));\n    document.querySelectorAll(\".overlay\").forEach(o => o.addEventListener(\"click\", e => { if (e.target === o && o.dataset.dismiss !== \"0\") hideOverlays(); }));\n    document.addEventListener(\"keydown\", e => { if (e.key === \"Escape\") document.querySelectorAll(\".overlay.show\").forEach(o => { if (o.dataset.dismiss !== \"0\") o.classList.remove(\"show\"); }); });\n\n    // onboarding — Langkah 1 (sambutan) → Langkah 2 (pengisian cepat) → tools\n    const obState = { harga: 1000000000, income: 15000000, dpPct: 20, tenor: 20, jenis: \"Fixed\", bank: \"-- Pilih Bank --\" };\n    const obFmtShort = (n) => {\n      if (n >= 1e9) return \"Rp \" + (n/1e9).toLocaleString(\"id-ID\",{maximumFractionDigits:2}) + \" M\";\n      if (n >= 1e6) return \"Rp \" + (n/1e6).toLocaleString(\"id-ID\",{maximumFractionDigits:1}) + \" jt\";\n      return \"Rp \" + Math.round(n).toLocaleString(\"id-ID\");\n    };\n    const obParse = (s) => parseInt(String(s).replace(/[^\\d]/g, \"\"), 10) || 0;\n    function obSetChip(wrapId, value) {\n      const wrap = $(wrapId); if (!wrap) return;\n      wrap.querySelectorAll(\".chip\").forEach(c => c.classList.toggle(\"active\", +c.dataset.v === +value));\n    }\n    function obRefresh() {\n      $(\"ob-harga-out\").textContent = obFmtShort(obState.harga);\n      $(\"ob-income-out\").textContent = obFmtShort(obState.income);\n      $(\"ob-dp-out\").textContent = obState.dpPct + \"%\";\n      $(\"ob-tenor-out\").textContent = obState.tenor + \" tahun\";\n    }\n    // text inputs (currency) di langkah 2\n    [[\"ob-harga\",\"harga\"],[\"ob-income\",\"income\"]].forEach(([id,key]) => {\n      const el = $(id);\n      el.addEventListener(\"input\", () => {\n        const v = obParse(el.value);\n        obState[key] = v;\n        el.value = v ? v.toLocaleString(\"id-ID\") : \"\";\n        obSetChip(id === \"ob-harga\" ? \"ob-chips-harga\" : \"ob-chips-income\", v);\n        obRefresh();\n      });\n    });\n    // chip groups di langkah 2\n    [[\"ob-chips-harga\",\"harga\",\"ob-harga\",true],[\"ob-chips-income\",\"income\",\"ob-income\",true],\n     [\"ob-chips-dp\",\"dpPct\",null,false],[\"ob-chips-tenor\",\"tenor\",null,false]].forEach(([wrapId,key,inputId,isCur]) => {\n      const wrap = $(wrapId);\n      wrap.querySelectorAll(\".chip\").forEach(c => {\n        c.addEventListener(\"click\", () => {\n          obState[key] = +c.dataset.v;\n          obSetChip(wrapId, obState[key]);\n          if (inputId) $(inputId).value = obState[key].toLocaleString(\"id-ID\");\n          obRefresh();\n        });\n      });\n    });\n    // populasi pilihan bank di langkah 2\n    BANKS.forEach(b => {\n      const opt = document.createElement(\"option\");\n      opt.value = b.name; opt.textContent = b.name;\n      $(\"ob-bank\").appendChild(opt);\n    });\n    // segmented Jenis KPR di langkah 2\n    $(\"ob-seg-jenis\").querySelectorAll(\"button\").forEach(b => {\n      b.addEventListener(\"click\", () => {\n        obState.jenis = b.dataset.v;\n        $(\"ob-seg-jenis\").querySelectorAll(\"button\").forEach(x => x.classList.toggle(\"active\", x === b));\n      });\n    });\n    // pilihan bank di langkah 2\n    $(\"ob-bank\").addEventListener(\"change\", () => { obState.bank = $(\"ob-bank\").value; });\n    // Langkah 1 → Langkah 2\n    $(\"onboard-start\").addEventListener(\"click\", () => {\n      // seed langkah 2 dari state berjalan (mis. dari skenario tersimpan)\n      obState.harga = state.harga; obState.income = state.income;\n      obState.dpPct = state.dpPct; obState.tenor = state.tenor;\n      obState.jenis = state.jenis; obState.bank = state.bank;\n      $(\"ob-harga\").value = (obState.harga || 0).toLocaleString(\"id-ID\");\n      $(\"ob-income\").value = (obState.income || 0).toLocaleString(\"id-ID\");\n      obSetChip(\"ob-chips-harga\", obState.harga); obSetChip(\"ob-chips-income\", obState.income);\n      obSetChip(\"ob-chips-dp\", obState.dpPct); obSetChip(\"ob-chips-tenor\", obState.tenor);\n      $(\"ob-seg-jenis\").querySelectorAll(\"button\").forEach(x => x.classList.toggle(\"active\", x.dataset.v === obState.jenis));\n      $(\"ob-bank\").value = obState.bank;\n      obRefresh();\n      $(\"onboard-intro\").style.display = \"none\";\n      $(\"onboard-form\").style.display = \"\";\n    });\n    // Langkah 2 → kembali ke Langkah 1\n    $(\"onboard-back\").addEventListener(\"click\", () => {\n      $(\"onboard-form\").style.display = \"none\";\n      $(\"onboard-intro\").style.display = \"\";\n    });\n    // Selesai → terapkan ke kalkulator\n    $(\"onboard-finish\").addEventListener(\"click\", () => {\n      state.harga = obState.harga || 0;\n      state.income = obState.income || 0;\n      state.dpPct = obState.dpPct;\n      state.tenor = obState.tenor;\n      state.jenis = obState.jenis;\n      state.bank = obState.bank;\n      const obBk = BANKS.find(x => x.name === obState.bank);\n      if (obBk && obBk.fixed !== null) {\n        state.fix = obBk.fixed; state.periode = obBk.periode;\n        state.float = obBk.floating; state.cap = obBk.capped;\n      }\n      try { localStorage.setItem(ONB_KEY, \"1\"); } catch (e) {}\n      syncInputsFromState();\n      recalc();\n      persistCurrent();\n      $(\"onboard\").classList.remove(\"show\");\n    });\n\n    // include nama skenario di header cetak\n    window.addEventListener(\"beforeprint\", () => {\n      const t = document.querySelector(\".print-header .title\");\n      const sc = activeId && scenarios.find(x => x.id === activeId);\n      if (t) t.textContent = \"Hasil Simulasi KPR — Nakahome\" + (sc ? \" · \" + sc.name : \"\");\n    });\n\n    // ---- Bungkus recalc: auto-save + update bar ----\n    const _recalcBase = recalc;\n    recalc = function () {\n      _recalcBase();\n      persistCurrent();\n      updateBarState();\n    };\n\n    // ============ Init ============\n    try {\n      const cur = JSON.parse(localStorage.getItem(CUR_KEY) || \"null\");\n      if (cur && typeof cur === \"object\") STATE_KEYS.forEach(k => { if (k in cur) state[k] = cur[k]; });\n      const sc = JSON.parse(localStorage.getItem(SCN_KEY) || \"[]\");\n      if (Array.isArray(sc)) scenarios = sc.filter(x => x && x.id && x.state);\n      activeId = localStorage.getItem(ACT_KEY) || null;\n      if (activeId && !scenarios.find(x => x.id === activeId)) activeId = null;\n    } catch (e) { scenarios = []; activeId = null; }\n\n    syncInputsFromState();\n    recalc();\n    renderScenarioBar();\n\n    if (!localStorage.getItem(ONB_KEY)) $(\"onboard\").classList.add(\"show\");\n  })();\n<\u002Fscript>\n\n<script>\n  // ===== Panduan (Guide) wiring: open from header button / onboarding, tabs, jump-to-section =====\n  (function () {\n    var guide = document.getElementById('modal-guide');\n    if (!guide) return;\n\n    function switchPane(id) {\n      document.querySelectorAll('.guide-tab').forEach(function (t) { t.classList.toggle('on', t.dataset.pane === id); });\n      document.querySelectorAll('.guide-pane').forEach(function (p) { p.classList.toggle('on', p.id === id); });\n      var body = guide.querySelector('.guide-body'); if (body) body.scrollTop = 0;\n    }\n    function openGuide(pane) {\n      document.querySelectorAll('.overlay.show').forEach(function (o) { if (o.dataset.dismiss !== '0') o.classList.remove('show'); });\n      if (pane) switchPane(pane);\n      guide.classList.add('show');\n    }\n    function gotoSection(id) {\n      var el = document.getElementById(id);\n      if (el) {\n        var top = window.pageYOffset + el.getBoundingClientRect().top - 16;\n        window.scrollTo({ top: Math.max(0, top), behavior: 'smooth' });\n      }\n    }\n\n    var tabs = document.getElementById('guide-tabs');\n    if (tabs) tabs.addEventListener('click', function (e) {\n      var t = e.target.closest('.guide-tab'); if (t) switchPane(t.dataset.pane);\n    });\n    guide.addEventListener('click', function (e) {\n      var j = e.target.closest('.guide-jump'); if (!j) return;\n      guide.classList.remove('show');\n      gotoSection(j.dataset.goto);\n    });\n\n    var gb = document.getElementById('btn-guide');\n    if (gb) gb.addEventListener('click', function () { openGuide('g-cara'); });\n    var ol = document.getElementById('onboard-guide-link');\n    if (ol) ol.addEventListener('click', function (e) { e.preventDefault(); openGuide('g-cara'); });\n  })();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
