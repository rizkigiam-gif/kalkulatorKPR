document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

F, U+A640-A69F, U+FE2E-FE2F;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"8d34c98a-55ec-4a7a-bdd6-4f2dd0944ab3\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"08aeb6fe-7f2c-4ba5-80de-2527c1d3c289\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Plus Jakarta Sans';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"54d18162-a9e7-4071-91b2-c950b04713a4\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n<style>\n  :root {\n    /* Warm paper neutrals */\n    --bg: oklch(0.985 0.004 75);\n    --bg-2: oklch(0.955 0.006 75);\n    --card: #ffffff;\n\n    /* Deep warm ink */\n    --ink: oklch(0.20 0.010 50);\n    --ink-2: oklch(0.46 0.010 55);\n    --ink-3: oklch(0.62 0.010 60);\n\n    /* Hairline borders */\n    --line: oklch(0.92 0.006 75);\n    --line-2: oklch(0.86 0.008 75);\n\n    /* Muted jade accent */\n    --accent: oklch(0.50 0.060 165);\n    --accent-soft: oklch(0.96 0.020 165);\n    --accent-ink: oklch(0.36 0.060 165);\n\n    /* Status — desaturated, refined */\n    --ok: oklch(0.54 0.085 160);\n    --ok-soft: oklch(0.965 0.022 160);\n    --warn: oklch(0.62 0.105 70);\n    --warn-soft: oklch(0.965 0.035 75);\n    --bad: oklch(0.56 0.135 25);\n    --bad-soft: oklch(0.965 0.025 25);\n\n    --radius: 10px;\n    --radius-lg: 14px;\n    --mono: \"JetBrains Mono\", ui-monospace, monospace;\n    --serif: \"Fraunces\", \"Cormorant Garamond\", \"DM Serif Display\", Georgia, serif;\n  }\n  * { box-sizing: border-box; }\n  html, body { margin: 0; padding: 0; }\n  body {\n    font-family: \"Plus Jakarta Sans\", system-ui, sans-serif;\n    background: var(--bg);\n    color: var(--ink);\n    font-size: 14px;\n    line-height: 1.45;\n    -webkit-font-smoothing: antialiased;\n    text-rendering: optimizeLegibility;\n  }\n  .num { font-family: var(--mono); font-feature-settings: \"tnum\" 1; }\n\n  /* layout */\n  .page { max-width: 1240px; margin: 0 auto; padding: 32px 24px 60px; }\n\n  /* ============ Refined Brand Header ============ */\n  header.brand {\n    position: relative;\n    margin-bottom: 28px;\n    padding-bottom: 22px;\n    border-bottom: 1px solid var(--line);\n  }\n  .brand-row {\n    display: flex; align-items: flex-start; justify-content: space-between;\n    gap: 28px; flex-wrap: wrap;\n  }\n  .brand-id {\n    display: flex; gap: 16px; align-items: flex-start;\n    flex: 1; min-width: 0;\n  }\n  .brand-monogram {\n    flex-shrink: 0;\n    width: 52px; height: 52px;\n    border-radius: 12px;\n    background: var(--ink);\n    color: white;\n    display: flex; align-items: center; justify-content: center;\n    margin-top: 4px;\n    box-shadow: 0 1px 0 rgba(0,0,0,0.04), 0 8px 24px -12px rgba(20,18,14,0.25);\n  }\n  .brand-monogram svg { width: 26px; height: 26px; }\n  .brand-text { min-width: 0; flex: 1; }\n  .brand-eyebrow {\n    display: inline-flex; align-items: center; gap: 8px;\n    font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase;\n    color: var(--ink-3); font-weight: 500;\n    margin-bottom: 8px;\n  }\n  .brand-eyebrow .dot {\n    width: 6px; height: 6px; border-radius: 50%;\n    background: var(--accent);\n    box-shadow: 0 0 0 3px var(--accent-soft);\n  }\n  .brand h1 {\n    font-family: var(--serif);\n    font-weight: 400;\n    font-size: 34px;\n    letter-spacing: -0.022em;\n    line-height: 1.08;\n    margin: 0 0 6px;\n    color: var(--ink);\n  }\n  .brand h1 .accent {\n    font-style: italic;\n    color: var(--accent-ink);\n    font-weight: 400;\n  }\n  .brand h1 .amp {\n    font-family: var(--serif);\n    font-style: italic;\n    font-weight: 400;\n    color: var(--ink-3);\n    margin: 0 0.04em;\n  }\n  .brand .tag {\n    color: var(--ink-2);\n    font-size: 13.5px;\n    line-height: 1.55;\n    max-width: 580px;\n    margin: 0;\n  }\n  .brand-actions {\n    display: flex; align-items: center; gap: 12px;\n    flex-shrink: 0;\n    padding-top: 4px;\n  }\n\n  .grid {\n    display: grid; gap: 20px;\n    grid-template-columns: minmax(0, 5fr) minmax(0, 7fr);\n  }\n  @media (max-width: 980px) { .grid { grid-template-columns: 1fr; } }\n\n  /* card */\n  .card {\n    background: var(--card);\n    border: 1px solid var(--line);\n    border-radius: var(--radius-lg);\n    padding: 22px;\n  }\n  .card h2 {\n    font-size: 11px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase;\n    color: var(--ink-3); margin: 0 0 14px;\n    display: flex; align-items: center; gap: 8px;\n  }\n  .card h2 .step {\n    width: 18px; height: 18px; border-radius: 50%;\n    background: var(--ink); color: white; display: inline-flex;\n    align-items: center; justify-content: center; font-size: 10px;\n    font-family: var(--mono); letter-spacing: 0;\n  }\n  .card + .card { margin-top: 16px; }\n\n  /* fields */\n  .row { display: grid; gap: 14px; }\n  .row.cols-2 { grid-template-columns: 1fr 1fr; }\n  .field { display: flex; flex-direction: column; gap: 6px; }\n  .field label {\n    font-size: 12px; color: var(--ink-2); font-weight: 500;\n    display: flex; justify-content: space-between; align-items: baseline;\n  }\n  .field .hint { font-size: 11px; color: var(--ink-3); margin-top: 2px; }\n  .field label .out { color: var(--ink); font-family: var(--mono); font-size: 11.5px; }\n  .input-wrap {\n    display: flex; align-items: stretch;\n    border: 1px solid var(--line-2);\n    border-radius: var(--radius);\n    background: var(--card);\n    transition: border-color .15s, box-shadow .15s;\n  }\n  .input-wrap:focus-within {\n    border-color: var(--accent);\n    box-shadow: 0 0 0 3px var(--accent-soft);\n  }\n  .input-wrap .prefix, .input-wrap .suffix {\n    padding: 0 12px; display: flex; align-items: center;\n    color: var(--ink-3); font-size: 13px; font-family: var(--mono);\n    background: var(--bg-2);\n    border-right: 1px solid var(--line);\n  }\n  .input-wrap .suffix { border-right: none; border-left: 1px solid var(--line); }\n  .input-wrap input, .input-wrap select {\n    flex: 1; min-width: 0; border: none; outline: none; background: transparent;\n    padding: 10px 12px; font-size: 14px; color: var(--ink);\n    font-family: var(--mono); font-feature-settings: \"tnum\" 1;\n  }\n  .input-wrap select { font-family: \"Plus Jakarta Sans\", sans-serif; cursor: pointer; }\n  .input-wrap input::placeholder { color: var(--ink-3); }\n  .input-wrap.disabled { opacity: .55; pointer-events: none; }\n\n  /* chips (segmented) */\n  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 6px; }\n  .chip {\n    border: 1px solid var(--line-2); background: var(--card);\n    border-radius: 999px; padding: 5px 11px; font-size: 12px;\n    color: var(--ink-2); cursor: pointer; font-family: var(--mono);\n    transition: all .15s;\n  }\n  .chip:hover { border-color: var(--ink-3); }\n  .chip.active { background: var(--ink); color: var(--card); border-color: var(--ink); }\n\n  /* progressive rate fields */\n  .rate-fields { display: flex; flex-wrap: wrap; gap: 14px; }\n  .rate-fields .field { flex: 1 1 calc(50% - 7px); min-width: 150px; }\n  .rate-fields .field[hidden] { display: none; }\n  .range-scale { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--ink-3); font-family: var(--mono); margin-top: 2px; }\n  .subdiv { height: 1px; background: var(--line); margin: 18px 0; }\n\n  /* segmented control */\n  .seg {\n    display: grid; grid-template-columns: repeat(4, 1fr);\n    background: var(--bg-2); padding: 4px;\n    border-radius: var(--radius); gap: 2px;\n    border: 1px solid var(--line);\n  }\n  .seg button {\n    border: none; background: transparent; cursor: pointer;\n    padding: 8px 6px; font-size: 12.5px; font-weight: 500;\n    color: var(--ink-2); border-radius: 7px;\n    font-family: inherit; transition: all .15s;\n  }\n  .seg button:hover { color: var(--ink); }\n  .seg button.active { background: var(--card); color: var(--ink); box-shadow: 0 1px 2px rgba(0,0,0,.06); }\n\n  /* results */\n  .headline {\n    padding: 6px 4px 18px;\n    border-bottom: 1px solid var(--line);\n    margin-bottom: 18px;\n  }\n  .headline .label {\n    font-size: 11px; font-weight: 600; letter-spacing: 0.14em;\n    text-transform: uppercase; color: var(--ink-3);\n  }\n  .headline .big {\n    font-family: var(--mono); font-size: 44px; font-weight: 500;\n    letter-spacing: -0.02em; color: var(--ink); margin-top: 4px;\n    line-height: 1.05;\n  }\n  .headline .big .rp { font-size: 22px; color: var(--ink-3); margin-right: 6px; vertical-align: 4px; }\n  .headline .sub { font-size: 13px; color: var(--ink-2); margin-top: 6px; }\n  .headline .sub .num { color: var(--ink); }\n\n  /* status banner */\n  .status {\n    display: flex; align-items: flex-start; gap: 14px;\n    padding: 14px 16px; border-radius: var(--radius);\n    margin-bottom: 18px; border: 1px solid;\n  }\n  .status .icon { width: 28px; height: 28px; flex-shrink: 0;\n    border-radius: 50%; display: flex; align-items: center; justify-content: center;\n    color: var(--card); font-weight: 600; font-size: 14px;\n  }\n  .status .t { font-size: 13.5px; font-weight: 600; }\n  .status .d { font-size: 12.5px; color: var(--ink-2); margin-top: 2px; }\n  .status.ok { background: var(--ok-soft); border-color: color-mix(in oklch, var(--ok) 25%, transparent); }\n  .status.ok .icon { background: var(--ok); }\n  .status.warn { background: var(--warn-soft); border-color: color-mix(in oklch, var(--warn) 25%, transparent); }\n  .status.warn .icon { background: var(--warn); }\n  .status.bad { background: var(--bad-soft); border-color: color-mix(in oklch, var(--bad) 25%, transparent); }\n  .status.bad .icon { background: var(--bad); }\n\n  /* metrics grid */\n  .metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }\n  @media (max-width: 560px) { .metrics { grid-template-columns: 1fr 1fr; } }\n  .metric {\n    background: var(--bg);\n    padding: 12px 14px; border-radius: var(--radius);\n    border: 1px solid var(--line);\n  }\n  .metric .k {\n    font-size: 11px; color: var(--ink-3); font-weight: 500;\n    letter-spacing: 0.04em; text-transform: uppercase;\n  }\n  .metric .v { font-family: var(--mono); font-size: 17px; margin-top: 4px; font-weight: 500; }\n  .metric .v.s { font-size: 14px; }\n\n  /* progress bar (komposisi) */\n  .breakdown { margin-top: 18px; }\n  .breakdown .title { font-size: 12px; color: var(--ink-2); margin-bottom: 8px; display: flex; justify-content: space-between; }\n  .bar {\n    height: 28px; display: flex; border-radius: 6px; overflow: hidden;\n    border: 1px solid var(--line);\n  }\n  .bar > div {\n    display: flex; align-items: center; padding: 0 10px;\n    font-family: var(--mono); font-size: 11.5px; font-weight: 500;\n    color: white; white-space: nowrap;\n  }\n  .bar .pokok { background: var(--accent); }\n  .bar .bunga { background: oklch(0.68 0.090 50); }\n  .legend { display: flex; gap: 18px; margin-top: 10px; font-size: 12px; color: var(--ink-2); }\n  .legend .sw { width: 10px; height: 10px; border-radius: 3px; display: inline-block; margin-right: 6px; vertical-align: middle; }\n\n  /* chart */\n  .chart-wrap { margin-top: 18px; }\n  .chart-wrap .title {\n    font-size: 12px; color: var(--ink-2); font-weight: 500; margin-b  { background: var(--bg-2); }\n  .cmp-table thead th:first-child { background: var(--bg-2); }\n  .cmp-table thead th:not(:first-child) {\n    font-family: var(--serif); font-weight: 500; font-size: 14.5px; color: var(--ink); letter-spacing: -0.01em;\n  }\n  .cmp-table tbody td { font-family: var(--mono); color: var(--ink); }\n  .cmp-table tbody tr:nth-child(even) td { background: var(--bg); }\n  .cmp-table tbody tr:nth-child(even) td:first-child { background: var(--bg); }\n  .cmp-best { color: var(--accent-ink); font-weight: 600; position: relative; }\n  .cmp-best::after { content: \" ✦\"; font-size: 10px; }\n  .cmp-badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 10.5px; font-weight: 600; font-family: \"Plus Jakarta Sans\", sans-serif; }\n  .cmp-badge.ok { background: var(--ok-soft); color: var(--ok); }\n  .cmp-badge.warn { background: var(--warn-soft); color: var(--warn); }\n  .cmp-badge.bad { background: var(--bad-soft); color: var(--bad); }\n  .cmp-note { font-size: 11.5px; color: var(--ink-3); margin-top: 12px; line-height: 1.5; }\n  .cmp-empty { text-align: center; color: var(--ink-3); font-size: 13px; padding: 28px 0; }\n\n  /* onboarding */\n  .onboard .modal { max-width: 460px; }\n  .onboard-top { text-align: center; padding: 30px 28px 0; }\n  .onboard-mono {\n    width: 58px; height: 58px; border-radius: 15px; background: var(--ink); color: white;\n    display: inline-flex; align-items: center; justify-content: center; margin-bottom: 18px;\n    box-shadow: 0 10px 28px -12px rgba(20,18,14,.4);\n  }\n  .onboard-mono svg { width: 30px; height: 30px; }\n  .onboard-eyebrow { font-size: 10.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--ink-3); font-weight: 500; margin-bottom: 8px; }\n  .onboard-top h2 { font-family: var(--serif); font-weight: 400; font-size: 27px; line-height: 1.12; letter-spacing: -0.022em; margin: 0; color: var(--ink); }\n  .onboard-top h2 .accent { font-style: italic; color: var(--accent- px; line-height: 1.14; letter-spacing: -0.02em; margin: 0; color: var(--ink); }\n  .onboard-form-head h2 .accent { font-style: italic; color: var(--accent-ink); }\n  .onboard-form-head p { font-size: 13px; color: var(--ink-2); line-height: 1.5; margin: 10px auto 0; max-width: 330px; }\n  .onboard-form-body { padding: 22px 28px 4px; display: flex; flex-direction: column; gap: 20px; }\n  .onboard-form-body .ob-group > .ob-label {\n    font-size: 11px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase;\n    color: var(--ink-3); margin-bottom: 10px; display: flex; align-items: center; gap: 8px;\n  }\n  .onboard-form-body .ob-label .num { font-family: var(--mono); color: var(--accent-ink); text-transform: none; letter-spacing: 0; font-weight: 600; }\n  .onboard-form-body .field { margin: 0; }\n  .ob-kpr-row { display: grid; grid-template-columns: 1fr; gap: 18px; }\n  .ob-sub { font-size: 11px; font-weight: 600; color: var(--ink-2); margin-bottom: 8px; display: flex; justify-content: space-between; align-items: baseline; }\n  .ob-sub .v { font-family: var(--mono); color: var(--accent-ink); font-size: 12px; }\n  .onboard-form-foot { padding: 20px 28px 26px; }\n  .onboard-form-foot .btn-save { width: 100%; justify-content: center; padding: 13px; font-size: 14px; }\n  .onboard-back-link { display:block; width:100%; text-align:center; background:none; border:none; margin-top:12px; color:var(--ink-3); font-family:inherit; font-size:12.5px; font-weight:500; cursor:pointer; padding:4px; }\n  .onboard-back-link:hover { color: var(--ink); }\n\n  /* ============ Panduan (Guide) modal ============ */\n  .modal.guide { max-width: 720px; display:flex; flex-direction:column; max-height:88vh; padding:0; overflow:hidden; }\n  .guide-head { padding: 24px 26px 0; }\n  .guide-head .gh-eyebrow { font-size:10.5px; letter-spacing:0.18em; text-transform:uppercase; color:var(--ink-3); font-weight:500; margin-bottom:8px; display:flex; align-items:center; gap:8px; }\n  .guide-head .gh-eyebrow .dot { width:6px; height:6px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 3px var(--accent-soft); }\n  .guide-head h3 { font-family:var(--serif); font-weight:400; font-size:25px; margin:0; letter-spacing:-0.02em; color:var(--ink); }\n  .guide-head h3 .accent { font-style:italic; color:var(--accent-ink); }\n  .guide-head p { color:var(--ink-2); font-size:13px; margin:8px 0 0; line-height:1.55; }\n  .guide-tabs { display:flex; gap:24px; padding:18px 26px 0; border-bottom:1px solid var(--line); flex-shrink:0; }\n  .guide-tab { border:none; background:transparent; padding:0 0 12px; font-family:inherit; font-size:13px; font-weight:600; color:var(--ink-3); cursor:pointer; border-bottom:2px solid transparent; margin-bottom:-1px; transition:color .15s; }\n  .guide-tab:hover { color:var(--ink); }\n  .guide-tab.on { color:var(--ink); border-bottom-color:var(--accent); }\n  .guide-body { padding:22px 26px 26px; overflow-y:auto; flex:1; min-height:0; }\n  .guide-pane { display:none; }\n  .guide-pane.on { display:block; animation:gFade .2s ease; }\n  @keyframes gFade { from{opacity:0; transform:translateY(4px);} to{opacity:1; transform:none;} }\n  .guide-intro { font-size:13px; color:var(--ink-2); line-height:1.6; margin:0 0 16px; }\n  .gstep { display:flex; gap:14px; align-items:flex-start; padding:14px 0; border-bottom:1px solid var(--line); }\n  .gstep:last-child { border-bottom:none; }\n  .gstep .n { width:30px; height:30px; border-radius:50%; background:var(--accent-soft); color:var(--accent-ink); font-family:var(--mono); font-size:13px; font-weight:600; display:flex; align-items:center; justify-content:center; flex-shrink:0; }\n  .gstep .n.ico { background:var(--bg-2); border:1px solid var(--line); font-size:15px; }\n  .gstep .gs-body { flex:1; min-width:0; }\n  .gstep .gs-t { font-size:14px; font-weight:600; color:var(--ink); }\n  .gstep .gs-t .opt { font-weight:500; color:var(--ink-3); font-size:11.5px; }\n  .gstep .gs-d { font-size:12.5px; color:var(--ink-2); margin-top:4px; line-height:1.55; }\n  .gstep .gs-d strong { color:var(--ink); }\n  .guide-jump { display:inline-flex; align-items:center; gap:6px; margin-top:9px; background:var(--ink); color:white; border:none; padding:6px 13px; border-radius:var(--radius); font-family:inherit; font-size:12px; font-weight:500; cursor:pointer; transition:opacity .15s, transform .1s; }\n  .guide-jump:hover { opacity:.88; }\n  .guide-jump:active { transform:translateY(1px); }\n  .gloss { display:flex; flex-direction:column; gap:10px; }\n  .gloss-item { padding:13px 15px; border:1px solid var(--line); border-radius:var(--radius); background:var(--bg); }\n  .gloss-item .term { font-weight:700; font-size:13.5px; color:var(--ink); display:flex; gap:9px; align-items:center; flex-wrap:wrap; }\n  .gloss-item .term .badge { font-family:var(--mono); font-size:10px; font-weight:500; padding:2px 8px; border-radius:999px; background:var(--accent-soft); color:var(--accent-ink); letter-spacing:0; }\n  .gloss-item .def { font-size:12.5px; color:var(--ink-2); margin-top:6px; line-height:1.6; }\n  .gloss-item .def strong { color:var(--ink); }\n  .guide-foot { padding:16px 26px 22px; display:flex; justify-content:flex-end; gap:10px; border-top:1px solid var(--line); flex-shrink:0; }\n  .btn-guide svg { stroke-width: 1.7; }\n  @media print { .btn-guide { display:none !important; } }\n\n  /* ============ Print styles ============ */\n  @media print {\n    @page { size: A4; margin: 14mm 12mm; }\n\n    html, body {\n      background: white !important;\n      color: var(--ink) !important;\n      font-size: 10.5pt;\n    }\n    body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }\n\n    .page { max-width: none; padding: 0; margin: 0; }\n\n    /* hide interactive-only chrome */\n    .btn-print, .brand-actions .brand-mark { display: none !important; }\n    .workspace, .overlay, .ws-pop { display: none !important; }\n    .chips, input[type=\"range\"], .seg, .range-scale,\n    #i-prepay-on, .switch, .help-icon { display: none !important; }\n    .toggle-row { display: none !important; }\n\n    /* show print-only header/footer */\n    .print-only { display: block; }\n    .print-header {\n      display: flex; justify-content: space-between; align-items: baseline;\n      padding-bottom: 8px; margin-bottom: 14px;\n      border-bottom: 1.5px solid var(--ink);\n    }\n    .print-header .title { font-size: 14pt; font-weight: 600; letter-spacing: -0.01em; }\n    .print-header .meta { font-size: 9pt; color: var(--ink-2); font-family: var(--mono); }\n    .print-footer {\n      margin-top: 14px; padding-top: 8px;\n      border-top: 1px solid var(--line);\n      font-size: 8.5pt; color: var(--ink-3); line-height: 1.5;\n      text-align: center;\n    }\n\n    /* condense layout — single column for print */\n    header.brand { margin-bottom: 10px; }\n    header.brand h1 { font-size: 14pt; margin: 0; }\n    header.brand .tag { display: none; }\n\n    .grid { display: block; }\n    .grid > section { display: block; }\n    .grid > section:first-child { margin-bottom: 12px; }\n\n    .card {\n      border: 1px solid var(--line-2);\n      border-radius: 8px;\n      padding: 12px 14px;\n      margin-bottom: 10px;\n      page-break-inside: avoid;\n      break-inside: avoid;\n    }\n    .card + .card { margin-top: 10px; }\n    .card h2 { font-size: 8.5pt; margin-bottom: 8px; }\n\n    /* render inputs as plain values */\n    .input-wrap {\n      border: none !important; background: transparent !important;\n      box-shadow: none !important; padding: 0 !important;\n    }\n    .input-wrap .prefix, .input-wrap .suffix {\n      background: transparent !important;\n      border: none !important;\n      padding: 0 4px 0 0 !important;\n      color: var(--ink-2) !important;\n      font-size: 10pt !important;\n    }\n    .input-wrap .suffix { padding: 0 0 0 4px !important; }\n    .input-wrap input, .input-wrap select {\n      padding: 2px 0 !important; font-size: 10pt !important;\n      color: var(--ink) !important; font-weight: 500;\n      -webkit-appearance: none; appearance: none;\n    }\n    .field label { font-size: 8.5pt; }\n    .field label .out { display: none; }\n    .row { gap: 8px; }\n\n    /* compact results */\n    .headline { padding: 0 0 10px; margin-bottom: 10px; }\n    .headline .big { font-size: 24pt; margin-top: 2px; }\n    .headline .big .rp { font-size: 13pt; }\n    .headline .sub { font-size: 9pt; margin-top: 4px; }\n\n    .status { padding: 10px 12px; margin-bottom: 10px; }\n    .status .icon { width: 22px; height: 22px; font-size: 11px; }\n    .status .t { font-size: 10pt; }\n    .status .d { font-size: 9pt; }\n\n    .metrics { gap: 8px; }\n    .metric { padding: 8px 10px; }\n    .metric .k { font-size: 8pt; }\n    .metric .v { font-size: 11pt; }\n\n    .breakdown { margin-top: 12px; }\n    .bar { height: 22px; }\n    .bar > div { font-size: 8.5pt; }\n\n    .chart-wrap { margin-top: 12px; page-break-inside: avoid; break-inside: avoid; }\n    svg.chart { height: 160px; }\n\n    .note { font-size: 9pt; padding: 8px 10px; margin-top: 10px; }\n\n    .savings-card {\n      padding: 12px 14px; margin-top: 10px;\n      page-break-inside: avoid; break-inside: avoid;\n    }\n    .savings-card h3 { font-size: 8.5pt; margin-bottom: 8px; }\n    .savings-grid .item { padding: 8px 10px; }\n    .savings-grid .item .v { font-size: 11pt; }\n\n    .reverse-card {\n      background: var(--ink) !important;\n      padding: 12px 14px; margin-top: 10px;\n      page-break-inside: avoid; break-inside: avoid;\n    }\n    .reverse-card h2 { font-size: 8.5pt; margin-bottom: 8px; }\n    .reverse-num { font-size: 16pt; }\n    .reverse-num .rp { font-size: 10pt; }\n    .reverse-detail { font-size: 9pt; }\n\n    /* table: open & paginated */\n    details.table-card { margin-top: 10px; }\n    details.table-card summary {\n      padding: 8px 10px;\n      border-radius: 6px 6px 0 0;\n      font-size: 9.5pt;\n    }\n    details.table-card summary::after { display: none; }\n    .table-scroll {\n      max-height: none !important;\n      overflow: visible !important;\n      border-radius: 0 0 6px 6px;\n    }\n    table { font-size: 9pt; }\n    thead { display: table-header-group; }\n    thead th {\n      padding: 6px 8px; font-size: 8pt;\n      background: var(--bg-2) !important;\n    }\n    tbody td { padding: 4px 8px; }\n    tbody tr { page-break-inside: avoid; break-inside: avoid; }\n    tbody tr.year-row td { background: var(--bg) !important; }\n\n    .foot { display: none; }\n\n    /* Tips */\n    .tips-card { padding: 12px 14px; page-break-inside: avoid; break-inside: avoid; }\n    .tip { padding: 8px 10px; }\n    .tip .t { font-size: 10pt; }\n    .tip .d { font-size: 8.5pt; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n<div class=\"page\">\n  <div class=\"print-only print-header\">\n    <div class=\"title\">Hasil Simulasi KPR — Nakahome<\u002Fdiv>\n    <div class=\"meta\" id=\"print-date\">—<\u002Fdiv>\n  <\u002Fdiv>\n  <header class=\"brand\">\n    <div class=\"brand-row\">\n      <div class=\"brand-id\">\n        <div class=\"brand-monogram\" aria-hidden=\"true\">\n          <svg viewBox=\"0 0 32 32\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n            <path d=\"M5 14 L16 5 L27 14 V26 a1 1 0 0 1 -1 1 H6 a1 1 0 0 1 -1 -1 Z\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpath>\n            <path d=\"M13 27 V19 a1 1 0 0 1 1 -1 h4 a1 1 0 0 1 1 1 V27\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpath>\n          <\u002Fsvg>\n        <\u002Fdiv>\n        <div class=\"brand-text\">\n          <div class=\"brand-eyebrow\"><span class=\"dot\"><\u002Fspan><span>Nakahome · Simulasi KPR<\u002Fspan><\u002Fdiv>\n          <h1>Kalkulator <span class=\"accent\">KPR<\u002Fspan> <span class=\"amp\">&amp;<\u002Fspan> Perencana <span class=\"accent\">Rumah<\u002Fspan><\u002Fh1>\n          <p class=\"tag\">Dibuat khusus untuk pasangan muda yang sedang berjuang mewujudkan rumah pertama — hitung cicilan akurat, lihat rumah maksimal yang sanggup kamu beli, dan rencanakan keuangan dengan lebih tenang.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"brand-actions\">\n        <button class=\"btn-print btn-guide\" id=\"btn-guide\" type=\"button\" title=\"Panduan penggunaan\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\">\n            <circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle>\n            <path d=\"M9.2 9.2a2.8 2.8 0 0 1 5.4 1c0 1.9-2.6 2.2-2.6 3.8\"><\u002Fpath>\n            <circle cx=\"12\" cy=\"17.4\" r=\"0.6\" fill=\"currentColor\"><\u002Fcircle>\n          <\u002Fsvg>\n          <span>Panduan<\u002Fspan>\n        <\u002Fbutton>\n        <button class=\"btn-print\" id=\"btn-print\" type=\"button\" title=\"Simpan hasil simulasi sebagai PDF\">\n          <svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\">\n            <path d=\"M12 3v12\"><\u002Fpath>\n            <path d=\"m7 10 5 5 5-5\"><\u002Fpath>\n            <path d=\"M5 21h14\"><\u002Fpath>\n          <\u002Fsvg>\n          <span>Simpan PDF<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div class=\"grid\">\n    <!-- LEFT: Inputs -->\n    <section>\n      <!-- Properti -->\n      <div class=\"card\" id=\"sec-properti\">\n        <h2><span class=\"step\">1<\u002Fspan>Informasi Properti<\u002Fh2>\n        <div class=\"row\">\n          <div class=\"field\">\n            <label for=\"i-harga\">Harga Rumah <span class=\"out\" id=\"o-harga\">—<\u002Fspan><\u002Flabel>\n            <div class=\"input-wrap\">\n              <span class=\"prefix\">Rp<\u002Fspan>\n              <input id=\"i-harga\" type=\"text\" inputmode=\"numeric\" value=\"1.000.000.000\">\n            <\u002Fdiv>\n            <div class=\"chips\" id=\"chips-harga\">\n              <button class=\"chip\" data-v=\"500000000\">500 jt<\u002Fbutton>\n              <button class=\"chip\" data-v=\"750000000\">750 jt<\u002Fbutton>\n              <button class=\"chip active\" data-v=\"1000000000\">1 M<\u002Fbutton>\n              <button class=\"chip\" data-v=\"1500000000\">1,5 M<\u002Fbutton>\n              <button class=\"chip\" data-v=\"2000000000\">2 M<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"row cols-2\">\n            <div class=\"field\">\n              <label for=\"i-dp-pct\">Uang Muka (DP) <span class=\"out\" id=\"o-dp-pct\">20%<\u002Fspan><\u002Flabel>\n              <div class=\"input-wrap\">\n                <input id=\"i-dp-pct\" type=\"number\" min=\"0\" max=\"100\" step=\"1\" value=\"20\">\n                <span class=\"suffix\">%<\u002Fspan>\n              <\u002Fdiv>\n              <div class=\"chips\" id=\"chips-dp\">\n                <button class=\"chip\" data-v=\"10\">10%<\u002Fbutton>\n                <button class=\"chip active\" data-v=\"20\">20%<\u002Fbutton>\n                <button class=\"chip\" data-v=\"30\">30%<\u002Fbutton>\n                <button class=\"chip\" data-v=\"40\">40%<\u002Fbutton>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"field\">\n              <label>DP Nominal <span class=\"out\">otomatis<\u002Fspan><\u002Flabel>\n              <div class=\"input-wrap\" style=\"background: var(--bg-2);\">\n                <span class=\"prefix\">Rp<\u002Fspan>\n                <input id=\"o-dp-rp\" type=\"text\" readonly=\"\" value=\"200.000.000\">\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"field\">\n            <label for=\"i-biaya-pct\">Biaya KPR (provisi, BPHTB, notaris, asuransi)\n              <span class=\"help-icon\" data-tip=\"Biaya yang muncul saat akad: BPHTB, notaris, provisi bank, asuransi jiwa &amp; kebakaran, appraisal. Umumnya 5–10% dari harga rumah. Bisa di-cover ke dalam pinjaman KPR.\">i<\u002Fspan>\n              <span class=\"out\" id=\"o-biaya-pct\">8%<\u002Fspan>\n            <\u002Flabel>\n            <div class=\"input-wrap\">\n              <input id=\"i-biaya-pct\" type=\"number\" min=\"0\" max=\"20\" step=\"0.5\" value=\"8\">\n              <span class=\"suffix\">%<\u002Fspan>\n            <\u002Fdiv>\n            <div class=\"hint\">Nominal: <span class=\"num\" id=\"o-biaya-rp\">Rp 80.000.000<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Parameter KPR -->\n      <div class=\"card\" id=\"sec-kpr\">\n        <h2><span class=\"step\">2<\u002Fspan>Parameter KPR<\u002Fh2>\n\n        <div class=\"row\">\n          <div class=\"field\">\n            <label for=\"i-tenor\">Tenor (Jangka Waktu) <span class=\"out\"><span id=\"o-tenor\">20<\u002Fspan> tahun · <span id=\"o-tenor-bln\" class=\"num\">240<\u002Fspan> bulan<\u002Fspan><\u002Flabel>\n            <input id=\"i-tenor\" type=\"range\" min=\"5\" max=\"30\" step=\"1\" value=\"20\">\n            <div class=\"range-scale\"><span>5 tahun<\u002Fspan><span>30 tahun<\u002Fspan><\u002Fdiv>\n            <div class=\"chips\" id=\"chips-tenor\">\n              <button class=\"chip\" data-v=\"5\">5 thn<\u002Fbutton>\n              <button class=\"chip\" data-v=\"10\">10 thn<\u002Fbutton>\n              <button class=\"chip\" data-v=\"15\">15 thn<\u002Fbutton>\n              <button class=\"chip active\" data-v=\"20\">20 thn<\u002Fbutton>\n              <button class=\"chip\" data-v=\"30\">30 thn<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"field\">\n            <label>Jenis KPR<\u002Flabel>\n            <div class=\"seg\" id=\"seg-jenis\">\n              <button class=\"active\" data-v=\"Fixed\">Fixed<\u002Fbutton>\n              <button data-v=\"Floating\">Floating<\u002Fbutton>\n              <button data-v=\"Fixed+Floating\">Fixed + Floating<\u002Fbutton>\n              <button data-v=\"Capped\">Capped<\u002Fbutton>\n            <\u002Fdiv>\n            <div class=\"hint\" id=\"hint-jenis\">Cicilan tetap sepanjang tenor.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"field\">\n            <label for=\"i-bank\">Bank <span class=\"out\">suku bunga ref. Mei 2025<\u002Fspan><\u002Flabel>\n            <div class=\"input-wrap\">\n              <select id=\"i-bank\"><\u002Fselect>\n            <\u002Fdiv>\n            <div class=\"hint\" id=\"hint-bank\">Pilih bank untuk mengisi bunga otomatis — atau isi manual di kolom bunga di bawah.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"rate-fields\" id=\"rate-fields\">\n            <div class=\"field\" id=\"f-fix\">\n              <label for=\"i-fix\">Bunga Fixed (% / tahun)<\u002Flabel>\n              <div class=\"input-wrap\" id=\"w-fix\">\n                <input id=\"i-fix\" type=\"number\" min=\"0\" max=\"30\" step=\"0.01\" value=\"7.00\">\n                <span class=\"suffix\">%<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"field\" id=\"f-periode\">\n              <label for=\"i-periode\">Periode Fixed<\u002Flabel>\n              <div class=\"input-wrap\" id=\"w-periode\">\n                <input id=\"i-periode\" type=\"number\" min=\"1\" max=\"20\" step=\"1\" value=\"3\">\n                <span class=\"suffix\">tahun<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"field\" id=\"f-float\">\n              <label for=\"i-float\">Bunga Floating (% / tahun)<\u002Flabel>\n              <div class=\"input-wrap\" id=\"w-float\">\n                <input id=\"i-float\" type=\"number\" min=\"0\" max=\"30\" step=\"0.01\" value=\"10.50\">\n                <span class=\"suffix\">%<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"field\" id=\"f-cap\">\n              <label for=\"i-cap\">Bunga Capped (% / tahun)<\u002Flabel>\n              <div class=\"input-wrap\" id=\"w-cap\">\n                <input id=\"i-cap\" type=\"number\" min=\"0\" max=\"30\" step=\"0.01\" value=\"12.00\">\n                <span class=\"suffix\">%<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Profil Keuangan & Pelunasan -->\n      <div class=\"card\" id=\"sec-keuangan\">\n        <h2><span class=\"step\">3<\u002Fspan>Profil Keuangan &amp; Pelunasan<\u002Fh2>\n        <div class=\"row\">\n          <div class=\"field\">\n            <label for=\"i-income\">Penghasilan Bulanan (take-home pay)<\u002Flabel>\n            <div class=\"input-wrap\">\n              <span class=\"prefix\">Rp<\u002Fspan>\n              <input id=\"i-income\" type=\"text\" inputmode=\"numeric\" value=\"15.000.000\">\n            <\u002Fdiv>\n            <div class=\"hint\">Batas aman cicilan: <span class=\"num\" id=\"o-batas\">Rp 4.500.000<\u002Fspan> (30% penghasilan).<\u002Fdiv>\n            <div class=\"chips\" id=\"chips-income\">\n              <button class=\"chip\" data-v=\"10000000\">10 jt<\u002Fbutton>\n              <button class=\"chip active\" data-v=\"15000000\">15 jt<\u002Fbutton>\n              <button class=\"chip\" data-v=\"20000000\">20 jt<\u002Fbutton>\n              <button class=\"chip\" data-v=\"30000000\">30 jt<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"subdiv\"><\u002Fdiv>\n\n        <div class=\"toggle-row\" style=\"padding:10px 12px;background:var(--bg-2);border-radius:var(--radius)\">\n          <div>\n            <div style=\"font-size:13px;color:var(--ink);font-weight:500\">Pelunasan dipercepat <span style=\"color:var(--ink-3);font-weight:400\">· opsional<\u002Fspan><\u002Fdiv>\n            <div style=\"font-size:11.5px;color:var(--ink-3);margin-top:2px\">Lihat dampak bayar ekstra ke pokok pinjaman<\u002Fdiv>\n          <\u002Fdiv>\n          <label class=\"switch\">\n            <input type=\"checkbox\" id=\"i-prepay-on\">\n            <span class=\"slider\"><\u002Fspan>\n          <\u002Flabel>\n        <\u002Fdiv>\n        <div class=\"row prepay-body\" id=\"prepay-body\" hidden=\"\" style=\"margin-top:14px\">\n          <div class=\"field\">\n            <label for=\"i-prepay-yearly\">Pelunasan Tahunan\n              <span class=\"help-icon\" data-tip=\"Pembayaran besar setahun sekali, misalnya dari THR, bonus akhir tahun, atau insentif. Dipotong di tiap akhir tahun untuk mempercepat pelunasan.\">i<\u002Fspan>\n            <\u002Flabel>\n            <div class=\"input-wrap\">\n              <span class=\"prefix\">Rp<\u002Fspan>\n              <input id=\"i-prepay-yearly\" type=\"text\" inputmode=\"numeric\" value=\"10.000.000\">\n            <\u002Fdiv>\n            <div class=\"chips\" id=\"chips-prepay-yearly\">\n              <button class=\"chip\" data-v=\"5000000\">5 jt<\u002Fbutton>\n              <button class=\"chip active\" data-v=\"10000000\">10 jt<\u002Fbutton>\n              <button class=\"chip\" data-v=\"25000000\">25 jt<\u002Fbutton>\n              <button class=\"chip\" data-v=\"50000000\">50 jt<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- RIGHT: Results -->\n    <section>\n      <div class=\"card\">\n        <h2>Hasil Simulasi<\u002Fh2>\n\n        <div class=\"headline\">\n          <div class=\"label\">Cicilan per bulan<\u002Fdiv>\n          <div class=\"big\"><span class=\"rp\">Rp<\u002Fspan><span id=\"r-cicilan\" class=\"num\">6.822.631<\u002Fspan><\u002Fdiv>\n          <div class=\"sub\" id=\"r-sub\">Cicilan tetap selama <span class=\"num\">20<\u002Fspan> tahun dengan bunga Fixed <span class=\"num\">7,00%<\u002Fspan>.<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div id=\"r-status\" class=\"status warn\">\n          <div class=\"icon\">!<\u002Fdiv>\n          <div>\n            <div class=\"t\" id=\"r-status-t\">Perlu dipertimbangkan<\u002Fdiv>\n            <div class=\"d\" id=\"r-status-d\">Rasio cicilan terhadap penghasilan: <span class=\"num\">45,5%<\u002Fspan>.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"metrics\">\n          <div class=\"metric\">\n            <div class=\"k\">Total Pinjaman<\u002Fdiv>\n            <div class=\"v\"><span class=\"num\" id=\"r-pinjaman\">Rp 880 jt<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"metric\">\n            <div class=\"k\">Total Bunga<\u002Fdiv>\n            <div class=\"v\"><span class=\"num\" id=\"r-bunga\">Rp 757 jt<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"metric\">\n            <div class=\"k\">Total Pembayaran<\u002Fdiv>\n            <div class=\"v\"><span class=\"num\" id=\"r-total\">Rp 1,64 M<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"breakdown\">\n          <div class=\"title\"><span>Komposisi Total Pembayaran<\u002Fspan><span class=\"num\" id=\"r-rasio-pb\">—<\u002Fspan><\u002Fdiv>\n          <div class=\"bar\">\n            <div class=\"pokok\" id=\"r-bar-pokok\">Pokok 54%<\u002Fdiv>\n            <div class=\"bunga\" id=\"r-bar-bunga\">Bunga 46%<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"legend\">\n            <div><span class=\"sw\" style=\"background:var(--accent)\"><\u002Fspan>Pokok pinjaman<\u002Fdiv>\n            <div><span class=\"sw\" style=\"background:oklch(0.68 0.090 50)\"><\u002Fspan>Bunga bank<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <div class=\"chart-wrap\">\n          <div class=\"title\">\n            <span>Sisa Pinjaman &amp; Komposisi Cicilan Tahunan<\u002Fspan>\n            <span class=\"legend2\">\n              <span><span style=\"display:inline-block;width:9px;height:9px;border-radius:2px;background:var(--accent);margin-right:4px;vertical-align:middle\"><\u002Fspan>Pokok<\u002Fspan>\n              <span><span style=\"display:inline-block;width:9px;height:9px;border-radius:2px;background:oklch(0.68 0.090 50);margin-right:4px;vertical-align:middle\"><\u002Fspan>Bunga<\u002Fspan>\n              <span><span style=\"display:inline-block;width:14px;height:2px;background:var(--ink);margin-right:4px;vertical-align:middle\"><\u002Fspan>Sisa pokok<\u002Fspan>\n            <\u002Fspan>\n          <\u002Fdiv>\n          <svg class=\"chart\" id=\"chart\" preserveAspectRatio=\"none\" viewBox=\"0 0 600 200\"><\u002Fsvg>\n        <\u002Fdiv>\n\n        <div class=\"note\" id=\"r-note\">\n          <b>Catatan:<\u002Fb> Cicilan tetap sepanjang tenor — paling aman untuk perencanaan jangka panjang.\n        <\u002Fdiv>\n\n        <div class=\"savings-card\" id=\"savings-card\" style=\"display:none\">\n          <h3><span>⚡<\u002Fspan>Dampak Pelunasan Dipercepat<\u002Fh3>\n          <div class=\"savings-grid\">\n            <div class=\"item\">\n              <div class=\"k\">Lunas Lebih Cepat<\u002Fdiv>\n              <div class=\"v\" id=\"s-tenor\">—<\u002Fdiv>\n              <div class=\"sub\" id=\"s-tenor-sub\">—<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"item\">\n              <div class=\"k\">Hemat Bunga<\u002Fdiv>\n              <div class=\"v\" id=\"s-bunga\">—<\u002Fdiv>\n              <div class=\"sub\" id=\"s-bunga-sub\">—<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"font-size:11.5px;color:var(--ink-2);margin-top:12px;line-height:1.5\">\n            <span id=\"s-extra-info\">—<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Tips Kontekstual -->\n      <div class=\"tips-card\">\n        <h2><span>💡<\u002Fspan>Tips &amp; Saran untuk Skenario Ini<\u002Fh2>\n        <div class=\"tips-list\" id=\"tips-list\"><\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fsection>\n  <\u002Fdiv>\n\n  <!-- ============ Workspace: Skenario Tersimpan (dipindah ke bawah) ============ -->\n  <div class=\"workspace\" id=\"workspace\">\n    <div class=\"ws-left\">\n      <div class=\"ws-label\">Skenario<span class=\"sub\">tersimpan di perangkat ini<\u002Fspan><\u002Fdiv>\n      <div class=\"ws-chips\" id=\"ws-chips\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"ws-actions\">\n      <button class=\"btn-save\" id=\"ws-save\" type=\"button\">\n        <svg width=\"14\" height=\"14\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\" aria-hidden=\"true\">\n          <path d=\"M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z\"><\u002Fpath>\n          <path d=\"M17 21v-8H7v8M7 3v5h8\"><\u002Fpath>\n        <\u002Fsvg>\n        <span>Simpan Skenario<\u002Fspan>\n      <\u002Fbutton>\n      <button class=\"btn-2\" id=\"ws-compare\" type=\"button\" disabled=\"\">Bandingkan<\u002Fbutton>\n      <button class=\"ws-icon\" id=\"ws-menu\" type=\"button\" title=\"Kelola data\" aria-label=\"Kelola data\">⋯<\u002Fbutton>\n      <div class=\"ws-pop\" id=\"ws-pop\">\n        <button type=\"button\" id=\"pop-reset\"><span class=\"pop-ico\">↺<\u002Fspan>Reset ke pengaturan awal<\u002Fbutton>\n        <div class=\"sep\"><\u002Fdiv>\n        <button type=\"button\" class=\"danger\" id=\"pop-clear\"><span class=\"pop-ico\">🗑<\u002Fspan>Hapus semua data<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <details class=\"table-card\">\n    <summary>\n      <span>Detail Cicilan Bulanan<\u002Fspan>\n      <span class=\"meta\" id=\"t-meta\">240 bulan · ringkasan tahunan + bulanan<\u002Fspan>\n    <\u002Fsummary>\n    <div class=\"table-scroll\">\n      <table>\n        <thead>\n          <tr>\n            <th>Bulan<\u002Fth>\n            <th>Bunga<\u002Fth>\n            <th>Angsuran Bunga<\u002Fth>\n            <th>Angsuran Pokok<\u002Fth>\n            <th>Total Cicilan<\u002Fth>\n            <th>Sisa Pinjaman<\u002Fth>\n          <\u002Ftr>\n        <\u002Fthead>\n        <tbody id=\"t-body\"><\u002Ftbody>\n      <\u002Ftable>\n    <\u002Fdiv>\n  <\u002Fdetails>\n\n  <p class=\"foot\">\n    Simulasi ini bersifat estimasi untuk perencanaan pribadi. Suku bunga aktual dan persyaratan KPR berbeda-beda per bank.<br>\n    Selalu konfirmasi dengan bank tujuan sebelum mengambil keputusan akad kredit.\n  <\u002Fp>\n\n  <div class=\"print-only print-footer\">\n    Dokumen ini dihasilkan dari Kalkulator KPR by Nakahome — bersifat estimasi untuk perencanaan pribadi.<br>\n    Suku bunga aktual dan persyaratan KPR dapat berbeda. Selalu konfirmasi dengan bank tujuan sebelum akad kredit.\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ Onboarding (sekali di awal) ============ -->\n<div class=\"overlay onboard\" id=\"onboard\" data-dismiss=\"0\">\n  <div class=\"modal\">\n   <div id=\"onboard-intro\">\n    <div class=\"onboard-top\">\n      <div class=\"onboard-mono\" aria-hidden=\"true\">\n        <svg viewBox=\"0 0 32 32\" fill=\"none\" xmlns=\"http://www.w3.org/2000/svg\">\n          <path d=\"M5 14 L16 5 L27 14 V26 a1 1 0 0 1 -1 1 H6 a1 1 0 0 1 -1 -1 Z\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpath>\n          <path d=\"M13 27 V19 a1 1 0 0 1 1 -1 h4 a1 1 0 0 1 1 1 V27\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linejoin=\"round\" fill=\"none\"><\u002Fpath>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <div class=\"onboard-eyebrow\">Nakahome · Simulasi KPR<\u002Fdiv>\n      <h2>Selamat datang di Kalkulator <span class=\"accent\">KPR<\u002Fspan><\u002Fh2>\n      <p>Alat bantu menghitung cicilan rumah dan merencanakan keuangan sebelum mengambil KPR. Tiga hal yang bisa kamu lakukan:<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"onboard-steps\">\n      <div class=\"onboard-step\">\n        <div class=\"n\">1<\u002Fdiv>\n        <div><div class=\"st\">Hitung cicilan &amp; cek kelayakan<\u002Fdiv><div class=\"sd\">Masukkan harga rumah, DP, tenor, dan penghasilan — lihat cicilan per bulan dan apakah masih di batas aman 30% income.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"onboard-step\">\n        <div class=\"n\">2<\u002Fdiv>\n        <div><div class=\"st\">Simpan &amp; bandingkan skenario<\u002Fdiv><div class=\"sd\">Simpan beberapa simulasi (mis. \"Rumah BSD\", \"Rumah Bekasi\") lalu bandingkan berdampingan untuk memilih yang paling pas.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"onboard-step\">\n        <div class=\"n\">3<\u002Fdiv>\n        <div><div class=\"st\">Rencanakan pelunasan lebih cepat<\u002Fdiv><div class=\"sd\">Simulasikan dampak menyisihkan THR atau bonus tahunan ke pokok pinjaman, dan lihat berapa banyak bunga yang bisa kamu hemat.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"onboard-foot\">\n      <button class=\"btn-save\" id=\"onboard-start\" type=\"button\"><span>Mulai simulasi<\u002Fspan><\u002Fbutton>\n      <button class=\"onboard-guide-link\" id=\"onboard-guide-link\" type=\"button\">Lihat panduan penggunaan dulu →<\u002Fbutton>\n      <div class=\"onboard-priv\">\n        <svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"11\" width=\"18\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M7 11V7a5 5 0 0 1 10 0v4\"><\u002Fpath><\u002Fsvg>\n        Semua data tersimpan otomatis di perangkat ini saja — tidak dikirim ke mana pun.\n      <\u002Fdiv>\n    <\u002Fdiv>\n   <\u002Fdiv>\n\n   <!-- Step 2: pengisian cepat -->\n   <div id=\"onboard-form\" class=\"onboard-form\" style=\"display:none\">\n    <div class=\"onboard-form-head\">\n      <div class=\"onboard-progress\"><span class=\"dot\"><\u002Fspan><span class=\"dot on\"><\u002Fspan><\u002Fdiv>\n      <h2>Isi data <span class=\"accent\">kamu<\u002Fspan><\u002Fh2>\n      <p>Tiga angka ini dipakai untuk menghitung simulasi. Semua bisa kamu ubah lagi nanti di dalam aplikasi.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"onboard-form-body\">\n      <div class=\"ob-group\">\n        <div class=\"ob-label\">Harga rumah <span class=\"num\" id=\"ob-harga-out\">Rp 1 M<\u002Fspan><\u002Fdiv>\n        <div class=\"field\">\n          <div class=\"input-wrap\">\n            <span class=\"prefix\">Rp<\u002Fspan>\n            <input id=\"ob-harga\" type=\"text\" inputmode=\"numeric\" value=\"1.000.000.000\">\n          <\u002Fdiv>\n          <div class=\"chips\" id=\"ob-chips-harga\">\n            <button class=\"chip\" data-v=\"500000000\" type=\"button\">500 jt<\u002Fbutton>\n            <button class=\"chip\" data-v=\"750000000\" type=\"button\">750 jt<\u002Fbutton>\n            <button class=\"chip active\" data-v=\"1000000000\" type=\"button\">1 M<\u002Fbutton>\n            <button class=\"chip\" data-v=\"1500000000\" type=\"button\">1,5 M<\u002Fbutton>\n            <button class=\"chip\" data-v=\"2000000000\" type=\"button\">2 M<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"ob-group\">\n        <div class=\"ob-label\">Penghasilan bulanan <span class=\"num\" id=\"ob-income-out\">Rp 15 jt<\u002Fspan><\u002Fdiv>\n        <div class=\"field\">\n          <div class=\"input-wrap\">\n            <span class=\"prefix\">Rp<\u002Fspan>\n            <input id=\"ob-income\" type=\"text\" inputmode=\"numeric\" value=\"15.000.000\">\n          <\u002Fdiv>\n          <div class=\"chips\" id=\"ob-chips-income\">\n            <button class=\"chip\" data-v=\"10000000\" type=\"button\">10 jt<\u002Fbutton>\n            <button class=\"chip active\" data-v=\"15000000\" type=\"button\">15 jt<\u002Fbutton>\n            <button class=\"chip\" data-v=\"20000000\" type=\"button\">20 jt<\u002Fbutton>\n            <button class=\"chip\" data-v=\"30000000\" type=\"button\">30 jt<\u002Fbutton>\n          <\u002Fdiv>\n          <div class=\"hint\">Cicilan idealnya maksimal 30% dari penghasilan.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"ob-group\">\n        <div class=\"ob-label\">Parameter KPR<\u002Fdiv>\n        <div class=\"ob-kpr-row\">\n          <div>\n            <div class=\"ob-sub\"><span>Uang muka (DP)<\u002Fspan><span class=\"v\" id=\"ob-dp-out\">20%<\u002Fspan><\u002Fdiv>\n            <div class=\"chips\" id=\"ob-chips-dp\">\n              <button class=\"chip\" data-v=\"10\" type=\"button\">10%<\u002Fbutton>\n              <button class=\"chip active\" data-v=\"20\" type=\"button\">20%<\u002Fbutton>\n              <button class=\"chip\" data-v=\"30\" type=\"button\">30%<\u002Fbutton>\n              <button class=\"chip\" data-v=\"40\" type=\"button\">40%<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div class=\"ob-sub\"><span>Tenor (jangka waktu)<\u002Fspan><span class=\"v\" id=\"ob-tenor-out\">20 tahun<\u002Fspan><\u002Fdiv>\n            <div class=\"chips\" id=\"ob-chips-tenor\">\n              <button class=\"chip\" data-v=\"5\" type=\"button\">5 thn<\u002Fbutton>\n              <button class=\"chip\" data-v=\"10\" type=\"button\">10 thn<\u002Fbutton>\n              <button class=\"chip\" data-v=\"15\" type=\"button\">15 thn<\u002Fbutton>\n              <button class=\"chip active\" data-v=\"20\" type=\"button\">20 thn<\u002Fbutton>\n              <button class=\"chip\" data-v=\"30\" type=\"button\">30 thn<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div class=\"ob-sub\"><span>Jenis KPR<\u002Fspan><\u002Fdiv>\n            <div class=\"seg\" id=\"ob-seg-jenis\">\n              <button class=\"active\" data-v=\"Fixed\" type=\"button\">Fixed<\u002Fbutton>\n              <button data-v=\"Floating\" type=\"button\">Floating<\u002Fbutton>\n              <button data-v=\"Fixed+Floating\" type=\"button\">Fixed + Floating<\u002Fbutton>\n              <button data-v=\"Capped\" type=\"button\">Capped<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div class=\"ob-sub\"><span>Bank<\u002Fspan><span class=\"v\">bunga ref. Mei 2025<\u002Fspan><\u002Fdiv>\n            <div class=\"input-wrap\"><select id=\"ob-bank\"><\u002Fselect><\u002Fdiv>\n            <div class=\"hint\">Pilih bank untuk mengisi suku bunga otomatis — bisa diubah lagi di dalam aplikasi.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"onboard-form-foot\">\n      <button class=\"btn-save\" id=\"onboard-finish\" type=\"button\"><span>Lihat hasil simulasi →<\u002Fspan><\u002Fbutton>\n      <button class=\"onboard-back-link\" id=\"onboard-back\" type=\"button\">← Kembali<\u002Fbutton>\n    <\u002Fdiv>\n   <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ Simpan Skenario ============ -->\n<div class=\"overlay\" id=\"modal-save\">\n  <div class=\"modal\">\n    <div class=\"modal-head\">\n      <h3>Simpan Skenario<\u002Fh3>\n      <p>Beri nama simulasi ini supaya mudah dikenali dan dibandingkan nanti.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"modal-body\">\n      <div class=\"modal-field\">\n        <label for=\"save-name\">Nama skenario<\u002Flabel>\n        <input id=\"save-name\" type=\"text\" maxlength=\"40\" placeholder=\"mis. Rumah BSD 1 M\">\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-foot\">\n      <button class=\"btn-2\" type=\"button\" data-close=\"\">Batal<\u002Fbutton>\n      <button class=\"btn-2\" id=\"save-new\" type=\"button\">Simpan sebagai baru<\u002Fbutton>\n      <button class=\"btn-save\" id=\"save-update\" type=\"button\">Perbarui<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ Bandingkan Skenario ============ -->\n<div class=\"overlay\" id=\"modal-compare\">\n  <div class=\"modal wide\">\n    <div class=\"modal-head\">\n      <h3>Bandingkan Skenario<\u002Fh3>\n      <p>Pilih hingga 4 skenario untuk dibandingkan berdampingan. Nilai terbaik ditandai ✦.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"modal-body\">\n      <div class=\"cmp-pick\" id=\"cmp-pick\"><\u002Fdiv>\n      <div id=\"cmp-result\"><\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"modal-foot\">\n      <button class=\"btn-save\" type=\"button\" data-close=\"\">Tutup<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ Konfirmasi ============ -->\n<div class=\"overlay\" id=\"modal-confirm\">\n  <div class=\"modal\" style=\"max-width:420px\">\n    <div class=\"modal-head\">\n      <h3 id=\"confirm-title\">Konfirmasi<\u002Fh3>\n      <p id=\"confirm-body\">—<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"modal-foot\">\n      <button class=\"btn-2\" type=\"button\" data-close=\"\">Batal<\u002Fbutton>\n      <button class=\"btn-danger\" id=\"confirm-ok\" type=\"button\">Hapus<\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ Panduan Penggunaan ============ -->\n<div class=\"overlay\" id=\"modal-guide\">\n  <div class=\"modal guide\">\n    <div class=\"guide-head\">\n      <div class=\"gh-eyebrow\"><span class=\"dot\"><\u002Fspan>Nakahome · Panduan<\u002Fdiv>\n      <h3>Cara pakai <span class=\"accent\">Kalkulator KPR<\u002Fspan><\u002Fh3>\n      <p>Panduan singkat untuk menghitung cicilan, menilai kelayakan, dan merencanakan KPR rumah impianmu.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"guide-tabs\" id=\"guide-tabs\">\n      <button class=\"guide-tab on\" data-pane=\"g-cara\" type=\"button\">Cara Pakai<\u002Fbutton>\n      <button class=\"guide-tab\" data-pane=\"g-fitur\" type=\"button\">Fitur<\u002Fbutton>\n      <button class=\"guide-tab\" data-pane=\"g-istilah\" type=\"button\">Istilah KPR<\u002Fbutton>\n    <\u002Fdiv>\n    <div class=\"guide-body\">\n      <!-- ===== CARA PAKAI ===== -->\n      <div class=\"guide-pane on\" id=\"g-cara\">\n        <p class=\"guide-intro\">Isi simulasi dari atas ke bawah. Setiap angka langsung memperbarui hasil di sebelah kanan — tidak perlu klik “hitung”.<\u002Fp>\n        <div class=\"gstep\">\n          <div class=\"n\">1<\u002Fdiv>\n          <div class=\"gs-body\">\n            <div class=\"gs-t\">Isi Informasi Properti<\u002Fdiv>\n            <div class=\"gs-d\">Masukkan <strong>harga rumah<\u002Fstrong> dan <strong>uang muka (DP)<\u002Fstrong>. Kalkulator otomatis menghitung nominal DP, biaya-biaya akad, dan total pinjaman yang dibutuhkan.<\u002Fdiv>\n            <button class=\"guide-jump\" data-goto=\"sec-properti\" type=\"button\">Buka bagian Properti →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"gstep\">\n          <div class=\"n\">2<\u002Fdiv>\n          <div class=\"gs-body\">\n            <div class=\"gs-t\">Atur Parameter KPR<\u002Fdiv>\n            <div class=\"gs-d\">Pilih <strong>tenor<\u002Fstrong> (lama cicilan), <strong>jenis bunga<\u002Fstrong> (Fixed, Floating, Capped, atau Fixed+Floating), dan <strong>bank<\u002Fstrong>. Suku bunga referensi akan terisi otomatis — bisa kamu ubah manual.<\u002Fdiv>\n            <button class=\"guide-jump\" data-goto=\"sec-kpr\" type=\"button\">Buka bagian Parameter KPR →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"gstep\">\n          <div class=\"n\">3<\u002Fdiv>\n          <div class=\"gs-body\">\n            <div class=\"gs-t\">Isi Profil Keuangan<\u002Fdiv>\n            <div class=\"gs-d\">Masukkan <strong>penghasilan bulanan<\u002Fstrong> agar kalkulator bisa menilai apakah cicilan masih dalam <strong>batas aman 30%<\u002Fstrong> dari penghasilanmu. Status kelayakan muncul di panel hasil.<\u002Fdiv>\n            <button class=\"guide-jump\" data-goto=\"sec-keuangan\" type=\"button\">Buka bagian Profil Keuangan →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"gstep\">\n          <div class=\"n\">4<\u002Fdiv>\n          <div class=\"gs-body\">\n            <div class=\"gs-t\">Rencanakan Pelunasan <span class=\"opt\">· opsional<\u002Fspan><\u002Fdiv>\n            <div class=\"gs-d\">Aktifkan <strong>Pelunasan Dipercepat<\u002Fstrong> untuk mensimulasikan menyisihkan THR/bonus ke pokok pinjaman — lihat berapa bulan lebih cepat lunas dan berapa bunga yang dihemat.<\u002Fdiv>\n            <button class=\"guide-jump\" data-goto=\"sec-keuangan\" type=\"button\">Buka bagian Pelunasan →<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== FITUR ===== -->\n      <div class=\"guide-pane\" id=\"g-fitur\">\n        <p class=\"guide-intro\">Selain menghitung, kalkulator ini membantu kamu membandingkan pilihan dan menyiapkan dokumen sebelum ke bank.<\u002Fp>\n        <div class=\"gstep\">\n          <div class=\"n ico\">💾<\u002Fdiv>\n          <div class=\"gs-body\">\n            <div class=\"gs-t\">Simpan Skenario<\u002Fdiv>\n            <div class=\"gs-d\">Simpan beberapa simulasi dengan nama berbeda (mis. “Rumah BSD”, “Rumah Bekasi”). Tersimpan otomatis di perangkat ini dan tampil di bar Skenario.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"gstep\">\n          <div class=\"n ico\">⚖️<\u002Fdiv>\n          <div class=\"gs-body\">\n            <div class=\"gs-t\">Bandingkan<\u002Fdiv>\n            <div class=\"gs-d\">Sandingkan hingga <strong>4 skenario<\u002Fstrong> berdampingan. Cicilan, total bunga, dan total pembayaran terendah otomatis ditandai ✦.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"gstep\">\n          <div class=\"n ico\">💡<\u002Fdiv>\n          <div class=\"gs-body\">\n            <div class=\"gs-t\">Tips &amp; Saran Otomatis<\u002Fdiv>\n            <div class=\"gs-d\">Saran kontekstual muncul di bawah hasil: stress test bunga floating, peringatan tenor panjang, peluang hemat bunga, hingga estimasi harga rumah yang sanggup kamu beli.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"gstep\">\n          <div class=\"n ico\">📄<\u002Fdiv>\n          <div class=\"gs-body\">\n            <div class=\"gs-t\">Simpan PDF<\u002Fdiv>\n            <div class=\"gs-d\">Cetak atau simpan ringkasan simulasi (lengkap dengan tabel angsuran) sebagai PDF untuk dibawa saat konsultasi ke bank.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"gstep\">\n          <div class=\"n ico\">🔒<\u002Fdiv>\n          <div class=\"gs-body\">\n            <div class=\"gs-t\">Privasi Terjaga<\u002Fdiv>\n            <div class=\"gs-d\">Semua data hanya tersimpan di browser perangkat ini — <strong>tidak dikirim ke server mana pun<\u002Fstrong>.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- ===== ISTILAH ===== -->\n      <div class=\"guide-pane\" id=\"g-istilah\">\n        <p class=\"guide-intro\">Istilah yang sering muncul di dunia KPR. Pahami sebentar supaya simulasimu lebih masuk akal.<\u002Fp>\n        <div class=\"gloss\">\n          <div class=\"gloss-item\"><div class=\"term\">Uang Muka (DP) <span class=\"badge\">% harga<\u002Fspan><\u002Fdiv><div class=\"def\">Pembayaran awal dari kantong sendiri; sisanya dipinjam dari bank. Aturan LTV Bank Indonesia umumnya mensyaratkan DP <strong>minimal 10–20%<\u002Fstrong> untuk rumah pertama.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gloss-item\"><div class=\"term\">Tenor <span class=\"badge\">tahun<\u002Fspan><\u002Fdiv><div class=\"def\">Jangka waktu cicilan, umumnya 5–30 tahun. Tenor panjang → cicilan bulanan lebih ringan, tapi <strong>total bunga lebih besar<\u002Fstrong>.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gloss-item\"><div class=\"term\">Bunga Fixed <span class=\"badge\">tetap<\u002Fspan><\u002Fdiv><div class=\"def\">Suku bunga tetap selama periode tertentu (mis. 3 tahun pertama). Cicilan pasti dan tidak berubah selama masa fixed.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gloss-item\"><div class=\"term\">Bunga Floating <span class=\"badge\">mengambang<\u002Fspan><\u002Fdiv><div class=\"def\">Mengikuti suku bunga acuan/pasar bank. Bisa naik-turun sehingga cicilan tidak pasti dari waktu ke waktu.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gloss-item\"><div class=\"term\">Bunga Capped <span class=\"badge\">berbatas<\u002Fspan><\u002Fdiv><div class=\"def\">Floating namun dengan <strong>batas atas (cap)<\u002Fstrong>. Cicilan bisa naik mengikuti pasar, tapi tidak melebihi batas yang ditentukan.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gloss-item\"><div class=\"term\">Fixed + Floating <span class=\"badge\">kombinasi<\u002Fspan><\u002Fdiv><div class=\"def\">Fixed di awal (mis. 3 tahun) lalu beralih ke floating. Perhatikan lonjakan cicilan setelah masa fixed habis.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gloss-item\"><div class=\"term\">Biaya KPR <span class=\"badge\">akad<\u002Fspan><\u002Fdiv><div class=\"def\">Biaya saat akad kredit: BPHTB, notaris, provisi bank, asuransi jiwa &amp; kebakaran, dan appraisal. Umumnya <strong>5–10% dari harga rumah<\u002Fstrong>.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gloss-item\"><div class=\"term\">Rasio Cicilan <span class=\"badge\">≤ 30%<\u002Fspan><\u002Fdiv><div class=\"def\">Perbandingan cicilan bulanan terhadap penghasilan. Idealnya <strong>≤ 30%<\u002Fstrong> agar keuangan tetap sehat; bank biasanya menolak jika melebihi 40%.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gloss-item\"><div class=\"term\">Pokok &amp; Bunga <span class=\"badge\">anuitas<\u002Fspan><\u002Fdiv><div class=\"def\">Tiap cicilan terdiri dari pokok (mengurangi utang) dan bunga (biaya pinjaman). Di awal porsi bunga besar; makin lama porsi pokok yang membesar.<\u002Fdiv><\u002Fdiv>\n          <div class=\"gloss-item\"><div class=\"term\">Pelunasan Dipercepat <span class=\"badge\">prepayment<\u002Fspan><\u002Fdiv><div class=\"def\">Membayar ekstra ke pokok pinjaman (mis. dari THR/bonus). Mempercepat pelunasan dan <strong>memangkas total bunga secara signifikan<\u002Fstrong>.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"guide-foot\">\n      <button class=\"btn-save\" type=\"button\" data-close=\"\"><span>Mengerti, mulai simulasi<\u002Fspan><\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  // ============ Bank data (Mei 2025 reference) ============\n  const BANKS = [\n    { name: \"-- Pilih Bank --\", fixed: null, periode: null, floating: null, capped: null },\n    { name: \"BCA\",             fixed: 6.99, periode: 3, floating: 11.50, capped: 12.00 },\n    { name: \"Mandiri\",         fixed: 6.95, periode: 3, floating: 11.25, capped: 12.00 },\n    { name: \"BRI\",             fixed: 6.99, periode: 3, floating: 11.25, capped: 12.00 },\n    { name: \"BNI\",             fixed: 6.99, periode: 3, floating: 11.00, capped: 12.00 },\n    { name: \"BTN\",             fixed: 6.99, periode: 5, floating: 11.00, capped: 12.00 },\n    { name: \"CIMB Niaga\",      fixed: 6.79, periode: 3, floating: 11.50, capped: 12.00 },\n    { name: \"Danamon\",         fixed: 6.99, periode: 3, floating: 11.50, capped: 12.00 },\n    { name: \"Permata Bank\",    fixed: 6.99, periode: 3, floating: 11.50, capped: 12.00 },\n    { name: \"OCBC NISP\",       fixed: 6.79, periode: 3, floating: 11.25, capped: 12.00 },\n    { name: \"Panin Bank\",      fixed: 6.99, periode: 3, floating: 11.50, capped: 12.00 },\n    { name: \"Maybank\",         fixed: 6.99, periode: 3, floating: 11.25, capped: 12.00 },\n    { name: \"BSI (Syariah)\",   fixed: 7.99, periode: 5, floating: 12.00, capped: 12.00 },\n    { name: \"Muamalat\",        fixed: 7.99, periode: 5, floating: 12.00, capped: 12.00 },\n    { name: \"Isi Manual\",      fixed: 7.00, periode: 3, floating: 10.50, capped: 12.00 },\n  ];\n\n  // ============ State & helpers ============\n  const state = {\n    harga: 1_000_000_000,\n    dpPct: 20,\n    biayaPct: 8,\n    tenor: 20,\n    jenis: \"Fixed\",\n    bank: \"-- Pilih Bank --\",\n    fix: 7.00,\n    periode: 3,\n    float: 10.50,\n    cap: 12.00,\n    income: 15_000_000,\n    prepayOn: false,\n    prepayMonthly: 0,\n    prepayYearly: 10_000_000,\n  };\n\n  const fmtRp = (n) => \"Rp \" + Math.round(n).toLocaleString(\"id-ID\");\n  const fmtShort = (n) => {\n    if (!isFinite(n)) return \"—\";\n    const a = Math.abs(n);\n    if (a >= 1e12) return \"Rp \" + (n/1e12).toLocaleString(\"id-ID\", {maximumFractionDigits:2}) + \" T\";\n    if (a >= 1e9)  return \"Rp \" + (n/1e9).toLocaleString(\"id-ID\", {maximumFractionDigits:2}) + \" M\";\n    if (a >= 1e6)  return \"Rp \" + (n/1e6).toLocaleString(\"id-ID\", {maximumFractionDigits:1}) + \" jt\";\n    if (a >= 1e3)  return \"Rp \" + (n/1e3).toLocaleString(\"id-ID\", {maximumFractionDigits:0}) + \" rb\";\n    return \"Rp \" + Math.round(n).toLocaleString(\"id-ID\");\n  };\n  const fmtPct = (n) => (n).toLocaleString(\"id-ID\", {maximumFractionDigits:2}) + \"%\";\n  const fmtNum = (n) => Math.round(n).toLocaleString(\"id-ID\");\n  const parseRp = (s) => parseInt(String(s).replace(/[^\\d]/g, \"\"), 10) || 0;\n\n  // PMT formula (matches Excel PMT(rate, nper, -pv))\n  const PMT = (rate, nper, pv) => {\n    if (rate === 0) return pv / nper;\n    return pv * rate / (1 - Math.pow(1 + rate, -nper));\n  };\n\n  // ============ DOM refs ============\n  const $ = (id) => document.getElementById(id);\n  const iHarga = $(\"i-harga\"), iDpPct = $(\"i-dp-pct\"), iBiayaPct = $(\"i-biaya-pct\");\n  const iTenor = $(\"i-tenor\"), iBank = $(\"i-bank\");\n  const iFix = $(\"i-fix\"), iPeriode = $(\"i-periode\"), iFloat = $(\"i-float\"), iCap = $(\"i-cap\");\n  const iIncome = $(\"i-income\");\n\n  // Populate bank select\n  BANKS.forEach(b => {\n    const opt = document.createElement(\"option\");\n    opt.value = b.name; opt.textContent = b.name;\n    iBank.appendChild(opt);\n  });\n\n  // Currency input formatter\n  function attachCurrencyMask(el, onChange) {\n    el.addEventListener(\"input\", () => {\n      const raw = parseRp(el.value);\n      el.value = raw === 0 ? \"\" : raw.toLocaleString(\"id-ID\");\n      onChange(raw);\n    });\n    el.addEventListener(\"blur\", () => {\n      const raw = parseRp(el.value);\n      el.value = raw.toLocaleString(\"id-ID\");\n    });\n  }\n  attachCurrencyMask(iHarga, v => { state.harga = v; setChipActive(\"chips-harga\", v); recalc(); });\n  attachCurrencyMask(iIncome, v => { state.income = v; setChipActive(\"chips-income\", v); recalc(); });\n\n  // Prepay inputs\n  const iPrepayOn = $(\"i-prepay-on\");\n  const iPrepayYearly = $(\"i-prepay-yearly\");\n  const prepayBody = $(\"prepay-body\");\n  iPrepayOn.addEventListener(\"change\", () => {\n    state.prepayOn = iPrepayOn.checked;\n    prepayBody.hidden = !state.prepayOn;\n    recalc();\n  });\n  attachCurrencyMask(iPrepayYearly, v => { state.prepayYearly = v; setChipActive(\"chips-prepay-yearly\", v); if (state.prepayOn) recalc(); });\n\n  iDpPct.addEventListener(\"input\", () => {\n    state.dpPct = Math.max(0, Math.min(100, +iDpPct.value || 0));\n    setChipActive(\"chips-dp\", state.dpPct);\n    recalc();\n  });\n  iBiayaPct.addEventListener(\"input\", () => { state.biayaPct = +iBiayaPct.value || 0; recalc(); });\n  iTenor.addEventListener(\"input\", () => {\n    state.tenor = +iTenor.value;\n    setChipActive(\"chips-tenor\", state.tenor);\n    recalc();\n  });\n\n  document.querySelectorAll(\"#chips-dp .chip\").forEach(c => {\n    c.addEventListener(\"click\", () => {\n      state.dpPct = +c.dataset.v; iDpPct.value = state.dpPct;\n      setChipActive(\"chips-dp\", state.dpPct); recalc();\n    });\n  });\n  document.querySelectorAll(\"#chips-tenor .chip\").forEach(c => {\n    c.addEventListener(\"click\", () => {\n      state.tenor = +c.dataset.v; iTenor.value = state.tenor;\n      setChipActive(\"chips-tenor\", state.tenor); recalc();\n    });\n  });\n  document.querySelectorAll(\"#chips-harga .chip\").forEach(c => {\n    c.addEventListener(\"click\", () => {\n      state.harga = +c.dataset.v; iHarga.value = state.harga.toLocaleString(\"id-ID\");\n      setChipActive(\"chips-harga\", state.harga); recalc();\n    });\n  });\n  document.querySelectorAll(\"#chips-income .chip\").forEach(c => {\n    c.addEventListener(\"click\", () => {\n      state.income = +c.dataset.v; iIncome.value = state.income.toLocaleString(\"id-ID\");\n      setChipActive(\"chips-income\", state.income); recalc();\n    });\n  });\n  document.querySelectorAll(\"#chips-prepay-yearly .chip\").forEach(c => {\n    c.addEventListener(\"click\", () => {\n      state.prepayYearly = +c.dataset.v; iPrepayYearly.value = state.prepayYearly.toLocaleString(\"id-ID\");\n      setChipActive(\"chips-prepay-yearly\", state.prepayYearly);\n      if (state.prepayOn) recalc();\n    });\n  });\n\n  document.querySelectorAll(\"#seg-jenis button\").forEach(b => {\n    b.addEventListener(\"click\", () => {\n      document.querySelectorAll(\"#seg-jenis button\").forEach(x => x.classList.remove(\"active\"));\n      b.classList.add(\"active\");\n      state.jenis = b.dataset.v;\n      recalc();\n    });\n  });\n\n  iBank.addEventListener(\"change\", () => {\n    state.bank = iBank.value;\n    const b = BANKS.find(x => x.name === state.bank);\n    if (b && b.fixed !== null) {\n      state.fix = b.fixed; iFix.value = b.fixed.toFixed(2);\n      state.periode = b.periode; iPeriode.value = b.periode;\n      state.float = b.floating; iFloat.value = b.floating.toFixed(2);\n      state.cap = b.capped; iCap.value = b.capped.toFixed(2);\n    }\n    updateRateLocks();\n    recalc();\n  });\n\n  [iFix, iPeriode, iFloat, iCap].forEach(el => {\n    el.addEventListener(\"input\", () => {\n      state.fix = +iFix.value || 0;\n      state.periode = +iPeriode.value || 0;\n      state.float = +iFloat.value || 0;\n      state.cap = +iCap.value || 0;\n      // typing manually => auto-switch to \"Isi Manual\"\n      if (state.bank !== \"Isi Manual\" && state.bank !== \"-- Pilih Bank --\") {\n        state.bank = \"Isi Manual\"; iBank.value = \"Isi Manual\";\n        updateRateL
